<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seatlify | Dashboard</title>
    
    <link rel="icon" type="image/png" href="../assets/images/seatlify_logo.png">

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    >

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/customization/theme.css">
    <link rel="stylesheet" href="../assets/customization/typography.css">
    <link rel="stylesheet" href="../assets/dashboard.css">
    <link rel="stylesheet" href="../assets/seat-planner.css">
    <link rel="stylesheet" href="../assets/ticket-styles.css">
    <link rel="stylesheet" href="../assets/analytics.css">
    <style>
        /* Custom styles for form switches to match the theme */
        .form-check-input {
            background-color: var(--bg-panel);
            border-color: var(--border-color);
        }
        .form-check-input:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }
    </style>

</head>
<body>

<div class="dashboard-layout">

    <!-- ============================
         SIDEBAR (Injected Once)
    ============================ -->
    <div class="sidebar-container" id="sidebar-container"></div>

    <!-- ============================
         BOTTOM NAV (Injected for Mobile)
    ============================ -->
    <div id="bottom-nav-container"></div>

    <!-- ============================
         MAIN CONTENT
    ============================ -->
    <main class="main-content expanded" id="mainContent">

            <!-- Bootstrap Header -->
            <nav class="navbar navbar-expand navbar-light border-bottom sticky-top" style="background-color: var(--bg-panel); padding-top: 1.25rem; padding-bottom: 1.25rem;">
                <div class="container-fluid px-4">
                    <span class="navbar-brand mb-0 h1">
                        <img src="../assets/images/seatlify_logo.png" alt="Seatlify" class="d-md-none" style="height: 32px; width: auto; object-fit: contain;">
                    </span>
                    
                    <div class="d-flex align-items-center ms-auto gap-3">
                        <!-- Notification Button -->
                        <div class="dropdown">
                            <a href="#" class="text-decoration-none text-secondary position-relative" id="dropdownNotifications" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-bell fs-5"></i>
                                <span id="notificationBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none; font-size: 0.6em; padding: .3em .5em;">
                                    <span class="visually-hidden">New alerts</span>
                                </span>
                            </a>
                            <ul id="notificationDropdownMenu" class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownNotifications" style="width: 350px; max-height: 400px; overflow-y: auto;">
                                <!-- Populated by JS -->
                            </ul>
                        </div>

                        <!-- Profile Button -->
                        <div class="dropdown">
                            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="rounded-circle me-2 d-flex align-items-center justify-content-center bg-secondary text-white" style="width: 32px; height: 32px;"><i class="bi bi-person-fill"></i></div>
                                <!-- <strong>User</strong> -->
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser1">
                                <li><a class="dropdown-item" href="#">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="../index.html">Sign out</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

        <div class="demo-wrapper">
            <div class="demo-content">
                <div id="dashboard-content">
                    <!-- Default content will load here -->
                    <div class="demo-panel p-3">Loading...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ============================
     OFFCANVAS
============================ -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="dashboardOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Dashboard Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <label for="gridSizeInput" class="form-label">Grid Size</label>
        <input type="range" class="form-range mb-3" id="gridSizeInput">

        <label for="seatSizeInput" class="form-label">Seat Size</label>
        <input type="number" class="form-control mb-3" id="seatSizeInput">

        <button class="btn btn-danger w-100">Clear Canvas</button>
    </div>
</div>

<!-- ============================
     SPEED DIAL (FAB)
============================ -->
<div class="speed-dial-container" id="speedDial">
    <div class="speed-dial-menu">
        <a href="#" class="speed-dial-item" title="Add Event" onclick="event.preventDefault(); window.openCreateEventModal();">
            <i class="bi bi-calendar-plus"></i>
        </a>
        <a href="#" class="speed-dial-item" title="Simulate Sale" onclick="event.preventDefault(); window.simulateSale();">
            <i class="bi bi-cart-plus"></i>
        </a>
        <a href="#" class="speed-dial-item" title="New Seat Plan" onclick="event.preventDefault(); document.querySelector('[data-target=seat-planner]').click()">
            <i class="bi bi-diagram-3"></i>
        </a>
        <a href="#" class="speed-dial-item" title="Send Invitation" onclick="event.preventDefault(); document.querySelector('[data-target=invitations]').click()">
            <i class="bi bi-envelope"></i>
        </a>
    </div>
    <button class="speed-dial-toggle">
        <i class="bi bi-plus-lg"></i>
    </button>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SortableJS (Required for Event Manager) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- ExcelJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<!-- Simulated Database -->
<script src="../js/simulated-db.js"></script>
<script>
    // Polyfill for missing QR code function in MockDB to prevent tickets.js errors
    if (typeof MockDB !== 'undefined' && typeof MockDB.generateQRCodeUrl === 'undefined') {
        MockDB.generateQRCodeUrl = (data) => `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data)}`;
    }
</script>

<!-- Dashboard Loader (SPA Logic) -->
<script src="../js/dashboard-loader.js"></script>
</body>
</html>
