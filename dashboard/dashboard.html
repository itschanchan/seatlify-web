<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seatlify | Dashboard</title>
    <link rel="icon" href="data:,">

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    >

    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/customization/theme.css">
    <link rel="stylesheet" href="../assets/customization/typography.css">
    <link rel="stylesheet" href="../assets/dashboard.css">
    <link rel="stylesheet" href="../assets/seat-planner.css">
    <link rel="stylesheet" href="../assets/ticket-styles.css">
    <link rel="stylesheet" href="../assets/analytics.css">

</head>
<body>

<div class="dashboard-layout">

    <!-- ============================
         SIDEBAR (Injected Once)
    ============================ -->
    <div class="sidebar-container" id="sidebar-container"></div>

    <!-- ============================
         BOTTOM NAV (Injected for Mobile)
    ============================ -->
    <div id="bottom-nav-container"></div>

    <!-- ============================
         MAIN CONTENT
    ============================ -->
    <main class="main-content expanded" id="mainContent">

            <!-- Bootstrap Header -->
            <nav class="navbar navbar-expand navbar-light border-bottom sticky-top" style="background-color: var(--bg-panel); padding-top: 1.25rem; padding-bottom: 1.25rem;">
                <div class="container-fluid px-4">
                    <span class="navbar-brand mb-0 h1">
                        <img src="../assets/images/seatlify_logo.png" alt="Seatlify" class="d-md-none" style="height: 32px; width: auto; object-fit: contain;">
                    </span>
                    
                    <div class="d-flex align-items-center ms-auto gap-3">
                        <!-- Notification Button -->
                        <div class="dropdown">
                            <a href="#" class="text-decoration-none text-secondary position-relative" id="dropdownNotifications" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="bi bi-bell fs-5"></i>
                                <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">
                                    <span class="visually-hidden">New alerts</span>
                                </span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownNotifications">
                                <li><h6 class="dropdown-header">Notifications</h6></li>
                                <li><a class="dropdown-item" href="#">New ticket sold</a></li>
                                <li><a class="dropdown-item" href="#">Event starting soon</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item small text-muted" href="#">Mark all as read</a></li>
                            </ul>
                        </div>

                        <!-- Profile Button -->
                        <div class="dropdown">
                            <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-dark" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="rounded-circle me-2 d-flex align-items-center justify-content-center bg-secondary text-white" style="width: 32px; height: 32px;"><i class="bi bi-person-fill"></i></div>
                                <!-- <strong>User</strong> -->
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="dropdownUser1">
                                <li><a class="dropdown-item" href="#">Profile</a></li>
                                <li><a class="dropdown-item" href="#">Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="../index.html">Sign out</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

        <div class="demo-wrapper">
            <div class="demo-content">
                <div id="dashboard-content">
                    <!-- Default content will load here -->
                    <div class="demo-panel p-3">Loading...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ============================
     OFFCANVAS
============================ -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="dashboardOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Dashboard Settings</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <label class="form-label">Grid Size</label>
        <input type="range" class="form-range mb-3">

        <label class="form-label">Seat Size</label>
        <input type="number" class="form-control mb-3">

        <button class="btn btn-danger w-100">Clear Canvas</button>
    </div>
</div>

<!-- ============================
     SPEED DIAL (FAB)
============================ -->
<div class="speed-dial-container" id="speedDial">
    <div class="speed-dial-menu">
        <a href="#" class="speed-dial-item" title="Add Event" onclick="event.preventDefault(); window.openCreateEventModal();">
            <i class="bi bi-calendar-plus"></i>
        </a>
        <a href="#" class="speed-dial-item" title="New Seat Plan" onclick="event.preventDefault(); document.querySelector('[data-target=seat-planner]').click()">
            <i class="bi bi-diagram-3"></i>
        </a>
        <a href="#" class="speed-dial-item" title="Send Invitation" onclick="event.preventDefault(); document.querySelector('[data-target=invitations]').click()">
            <i class="bi bi-envelope"></i>
        </a>
    </div>
    <button class="speed-dial-toggle">
        <i class="bi bi-plus-lg"></i>
    </button>
</div>

<!-- Edit Event Modal (Global) -->
<div class="modal fade" id="editEventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: var(--bg-panel); color: var(--text-main);">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title">Edit Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editEventForm">
                    <input type="hidden" id="editEventId">
                    <div class="mb-3">
                        <label for="editEventName" class="form-label" style="color: var(--text-muted);">Event Name</label>
                        <input type="text" class="form-control" id="editEventName" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    </div>
                    <div class="row">
                        <div class="col-12 col-md-4 mb-3">
                            <label for="editEventDate" class="form-label" style="color: var(--text-muted);">Date</label>
                            <input type="text" class="form-control" id="editEventDate" placeholder="Select Date" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-6 col-md-4 mb-3">
                            <label for="editEventTime" class="form-label" style="color: var(--text-muted);">Start Time</label>
                            <input type="text" class="form-control" id="editEventTime" placeholder="Select Time" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-6 col-md-4 mb-3">
                            <label for="editEventEndTime" class="form-label" style="color: var(--text-muted);">End Time</label>
                            <input type="text" class="form-control" id="editEventEndTime" placeholder="Select Time" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editEventVenue" class="form-label" style="color: var(--text-muted);">Venue</label>
                        <select class="form-select" id="editEventVenue" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editEventDescription" class="form-label" style="color: var(--text-muted);">Description</label>
                        <textarea class="form-control" id="editEventDescription" rows="3" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);"></textarea>
                    </div>

                    <hr style="border-color: var(--border-color);">
                    
                    <!-- Seat Config -->
                    <h6 class="mb-3" style="color: var(--text-muted);">Seat Configuration</h6>
                    <div class="row">
                        <div class="col-6 col-md-6 mb-3">
                            <label for="editEventTotalSeats" class="form-label" style="color: var(--text-muted);">Total Seats</label>
                            <input type="number" class="form-control" id="editEventTotalSeats" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-6 col-md-6 mb-3">
                            <label for="editEventTotalTables" class="form-label" style="color: var(--text-muted);">Total Tables</label>
                            <input type="number" class="form-control" id="editEventTotalTables" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editSeatLayout" class="form-label" style="color: var(--text-muted);">Layout Preference</label>
                        <select class="form-select" id="editSeatLayout" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                            <option value="empty">Empty Canvas</option>
                            <option value="theater">Theater Style</option>
                            <option value="banquet">Banquet Hall</option>
                        </select>
                    </div>

                    <hr style="border-color: var(--border-color);">

                    <!-- Ticket Config -->
                    <h6 class="mb-3" style="color: var(--text-muted);">Ticket Configuration</h6>
                    <div class="mb-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="editEventType" id="editTypeFree" value="free">
                            <label class="form-check-label" for="editTypeFree" style="color: var(--text-main);">Free Event</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="editEventType" id="editTypePaid" value="paid">
                            <label class="form-check-label" for="editTypePaid" style="color: var(--text-main);">Paid Event</label>
                        </div>
                    </div>
                    <div id="editTicketTiersWrapper" style="display: none;">
                        <label class="form-label" style="color: var(--text-muted);">Ticket Tiers</label>
                        <div id="editTiersList"></div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="btnEditAddTier" style="border-color: var(--border-color); color: var(--text-muted);">
                            <i class="bi bi-plus"></i> Add Tier
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btnSaveEdit" style="background-color: var(--primary); border-color: var(--primary);">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SortableJS (Required for Event Manager) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

<!-- Flatpickr JS -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<!-- Simulated Database -->
<script src="../js/simulated-db.js"></script>
<script>
    // Polyfill for missing QR code function in MockDB to prevent tickets.js errors
    if (typeof MockDB !== 'undefined' && typeof MockDB.generateQRCodeUrl === 'undefined') {
        MockDB.generateQRCodeUrl = (data) => `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(data)}`;
    }
</script>

<!-- Dashboard Loader (SPA Logic) -->
<script src="../js/dashboard-loader.js"></script>
</body>
</html>
