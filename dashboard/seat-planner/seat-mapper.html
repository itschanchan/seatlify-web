<div class="container-fluid pt-0 pb-4 d-flex flex-column">
    <style>
        /* ── Chart-group selection highlight ── */
        .chart-group.selected {
            outline: 2px solid var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light) !important;
        }

        /* ── Grid background (applied on map tab canvas) ── */
        .grid-background {
            background-image:
                linear-gradient(to right, var(--border-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--border-color) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* ── Drag-over indicator on map canvas ── */
        .seat-planner-container.drag-over {
            border: 2px dashed var(--primary) !important;
        }

        /* ── Range-slider thumb colour ── */
        .form-range::-webkit-slider-thumb { background-color: #E53935; }
        .form-range::-moz-range-thumb     { background-color: #E53935; }
        .form-range::-ms-thumb            { background-color: #E53935; }

        /* ── Blueprint chair shape ── */
        .shape.chair {
            background-color: var(--color-text-muted);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
        }

        /* ── Mobile overrides ── */
        @media (max-width: 767.98px) {
            .seat-planner-nav-container { flex-wrap: wrap; }
            #pills-chart .flex-md-row   { flex-direction: column !important; }
            #seatPlannerToolbar         { justify-content: flex-start !important; }
            .seat-planner-container     { height: 50vh !important; min-height: 300px; }
        }
    </style>

    <!-- ══════════════════════════════════════════
         EMPTY STATE
    ══════════════════════════════════════════ -->
    <div id="seatPlannerEmptyState" class="text-center py-5" style="display: none;">
        <div class="mb-4">
            <i class="bi bi-calendar-plus display-1 text-muted"></i>
        </div>
        <h3 class="text-muted">Create an Event to Get Started</h3>
        <p class="text-muted mb-4">There are no events in the system. Go to the dashboard to create your first event.</p>
        <button class="btn btn-primary btn-lg"
                onclick="document.querySelector('.sidebar-nav .nav-link[data-target=\'dashboard\']').click()">
            <i class="bi bi-plus-circle me-2"></i>Create an Event
        </button>
    </div>

    <!-- ══════════════════════════════════════════
         MAIN CONTENT
    ══════════════════════════════════════════ -->
    <div id="seatPlannerMainContent">

        <h2 class="mb-4 fw-bold">Seat Planner</h2>

        <!-- ── NAV TABS + SEAT COUNTER ── -->
        <div class="seat-planner-nav-container mb-3 d-flex justify-content-between align-items-center w-100 gap-3">
            <ul class="nav nav-pills" id="seatPlannerTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active"
                            id="pills-chart-tab"
                            data-bs-toggle="pill"
                            data-bs-target="#pills-chart"
                            type="button" role="tab"
                            aria-controls="pills-chart"
                            aria-selected="true">Chart</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            id="pills-blueprint-tab"
                            data-bs-toggle="pill"
                            data-bs-target="#pills-blueprint"
                            type="button" role="tab"
                            aria-controls="pills-blueprint"
                            aria-selected="false">Map</button>
                </li>
            </ul>

            <!-- Seat Counter -->
            <div class="d-flex align-items-center gap-2 px-3 py-2 rounded shadow-sm"
                 style="background-color: var(--bg-panel); border: 1px solid var(--border-color);">
                <i class="bi bi-person-workspace" style="color: var(--text-muted);"></i>
                <span class="d-none d-sm-inline" style="color: var(--text-muted);">Total Seats:</span>
                <span id="plannerTotalSeats" class="fw-bold" style="color: var(--primary);">0</span>
                <button class="btn btn-sm btn-link p-0 ms-2"
                        id="btnEditTotalSeats"
                        title="Edit Capacity"
                        style="color: var(--text-muted); text-decoration: none;">
                    <i class="bi bi-pencil-square"></i>
                </button>
            </div>
        </div>

        <!-- ══════════════════════════════════════════
             TAB PANES
        ══════════════════════════════════════════ -->
        <div class="tab-content w-100" id="seatPlannerTabContent">

            <!-- ── CHART VIEW ── -->
            <div class="tab-pane fade show active"
                 id="pills-chart" role="tabpanel"
                 aria-labelledby="pills-chart-tab">

                <div class="p-3 border rounded"
                     style="background-color: var(--bg-panel);
                            color: var(--text-muted);
                            border-color: var(--border-color) !important;">
                    <div class="h-100">
                        <div class="flex-grow-1" style="min-width: 0;">

                            <!-- Chart Tools Accordion -->
                            <div class="accordion mb-3" id="chartToolsAccordion">
                                <div class="accordion-item"
                                     style="background-color: var(--bg-panel); border-color: var(--border-color);">
                                    <h2 class="accordion-header" id="headingTools">
                                        <button class="accordion-button py-2"
                                                type="button"
                                                data-bs-toggle="collapse"
                                                data-bs-target="#chartToolsCollapse"
                                                aria-expanded="true"
                                                aria-controls="chartToolsCollapse"
                                                style="background-color: var(--bg-panel);
                                                       color: var(--text-main);
                                                       box-shadow: none;">
                                            <i class="bi bi-tools me-2"></i> Tools
                                        </button>
                                    </h2>

                                    <div id="chartToolsCollapse"
                                         class="accordion-collapse collapse show"
                                         aria-labelledby="headingTools"
                                         data-bs-parent="#chartToolsAccordion">
                                        <div class="accordion-body p-2">
                                            <div class="d-flex gap-2 flex-wrap align-items-center">

                                                <!-- Grouping -->
                                                <button class="btn btn-sm btn-outline-secondary active"
                                                        id="btnGroupRow"
                                                        title="Group by Row"
                                                        style="color: var(--text-main); border-color: var(--border-color);">
                                                    <i class="bi bi-list-ul"></i>
                                                    <span class="d-none d-sm-inline">Row</span>
                                                </button>
                                                <button class="btn btn-sm btn-outline-secondary"
                                                        id="btnGroupTable"
                                                        title="Group by Table"
                                                        style="color: var(--text-main); border-color: var(--border-color);">
                                                    <i class="bi bi-grid-3x3"></i>
                                                    <span class="d-none d-sm-inline">Table</span>
                                                </button>

                                                <div class="vr d-none d-md-block"></div>

                                                <!-- Actions -->
                                                <button class="btn btn-sm btn-primary"
                                                        id="btnAutoBuild"
                                                        style="background-color: var(--primary); border-color: var(--primary);">
                                                    <i class="bi bi-magic"></i>
                                                    <span class="d-none d-sm-inline">Auto Build</span>
                                                </button>
                                                <button class="btn btn-sm btn-outline-danger" id="btnClearChart">
                                                    <i class="bi bi-trash"></i>
                                                    <span class="d-none d-sm-inline">Clear</span>
                                                </button>

                                                <div class="vr mx-2 d-none d-md-block"></div>

                                                <!-- Undo / Redo -->
                                                <button class="btn btn-sm btn-outline-secondary"
                                                        id="btnUndoChart"
                                                        title="Undo (Ctrl+Z)" disabled>
                                                    <i class="bi bi-arrow-counterclockwise"></i>
                                                </button>
                                                <button class="btn btn-sm btn-outline-secondary"
                                                        id="btnRedoChart"
                                                        title="Redo (Ctrl+Y)" disabled>
                                                    <i class="bi bi-arrow-clockwise"></i>
                                                </button>

                                                <div class="vr mx-2 d-none d-md-block"></div>

                                                <!-- Row-label toggle -->
                                                <div class="form-check form-switch mb-0">
                                                    <input class="form-check-input"
                                                           type="checkbox"
                                                           id="toggleRowLabels"
                                                           checked
                                                           style="cursor: pointer;">
                                                    <label class="form-check-label"
                                                           for="toggleRowLabels"
                                                           style="color: var(--text-main); cursor: pointer;">Labels</label>
                                                </div>

                                                <div class="vr mx-2 d-none d-md-block"></div>

                                                <!-- Save / Edit mode -->
                                                <div class="ms-auto">
                                                    <button class="btn btn-sm btn-outline-secondary"
                                                            id="btnEditChart"
                                                            style="display: none;">
                                                        <i class="bi bi-pencil"></i> Edit
                                                    </button>
                                                    <button class="btn btn-sm btn-primary" id="btnSaveChart">
                                                        <i class="bi bi-save"></i> Save
                                                    </button>
                                                </div>

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- /Chart Tools Accordion -->

                            <!-- Chart Canvas -->
                            <div id="chartViewContainer"
                                 class="p-3 border rounded overflow-auto"
                                 style="min-height: 400px; max-height: 600px;
                                        background-color: var(--bg-muted);">
                                <div id="seatPlannerRowContainer" class="d-flex flex-column gap-3">
                                    <div class="text-center text-muted p-4">
                                        The chart is empty. Add a new row or use 'Auto Build' to get started.
                                    </div>
                                </div>
                            </div>

                            <!-- Overall Seat Slider (edit mode only) -->
                            <div id="overallSeatSliderContainer" class="mt-4" style="display: none;">
                                <label for="seat-slider" class="form-label">Number of Seats (All Rows)</label>
                                <div class="d-flex align-items-center gap-2">
                                    <input type="range" class="form-range" min="1" max="100" id="seat-slider">
                                    <span id="seat-slider-max"
                                          class="badge bg-secondary"
                                          style="min-width: 60px; font-size: 1rem; padding: .5em .75em;"
                                          title="Max seats per row">100</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <!-- /CHART VIEW -->

            <!-- ── MAP VIEW ── (content injected from seat-planner.html) -->
            <div class="tab-pane fade d-flex flex-column"
                 id="pills-blueprint" role="tabpanel"
                 aria-labelledby="pills-blueprint-tab"
                 style="height: 75vh;">
                
                <!-- CANVAS WRAPPER -->
                <div class="position-relative shadow-sm border rounded overflow-hidden w-100 flex-grow-1">

                    <!-- CANVAS -->
                    <div class="seat-planner-container grid-background h-100"
                        id="canvas"
                        style="border: none; background-color: var(--bg-panel);">
                        <div class="canvas-inner" id="canvasInner"></div>
                    </div>

                    <!-- ZOOM CONTROLS -->
                    <div class="zoom-controls-container">
                        <div class="zoom-controls">
                            <button id="zoomIn"
                                    class="btn btn-sm border"
                                    style="background-color: var(--bg-panel);
                                        color: var(--text-main);
                                        border-color: var(--border-color);">+</button>
                            <button id="zoomOut"
                                    class="btn btn-sm border"
                                    style="background-color: var(--bg-panel);
                                        color: var(--text-main);
                                        border-color: var(--border-color);">−</button>
                        </div>
                    </div>
                </div>

                <!-- TOOLBAR -->
                <div class="btn-toolbar gap-1 justify-content-center flex-wrap p-2 rounded shadow-sm border mt-3"
                    id="seatPlannerToolbar"
                    style="background-color: var(--bg-panel);
                            border-color: var(--border-color) !important;
                            flex-shrink: 0;">

                    <!-- Select -->
                    <button class="btn btn-outline-secondary tool-btn active" data-tool="select">
                        <i class="bi bi-cursor-fill"></i>
                    </button>

                    <!-- Rectangle + Circle Dropdown -->
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary tool-btn"
                                id="shapeMainBtn"
                                data-tool="rect"
                                draggable="true">
                            <i id="shapeMainIcon" class="bi bi-square"></i>
                        </button>

                        <button class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split"
                                data-bs-toggle="dropdown"></button>

                        <ul class="dropdown-menu">
                            <li>
                                <button class="dropdown-item shape-option"
                                        data-tool="rect"
                                        data-icon="bi-square">
                                    <i class="bi bi-square me-2"></i> Rectangle
                                </button>
                            </li>
                            <li>
                                <button class="dropdown-item shape-option"
                                        data-tool="circle"
                                        data-icon="bi-circle">
                                    <i class="bi bi-circle me-2"></i> Circle
                                </button>
                            </li>
                        </ul>
                    </div>

                    <!-- Text -->
                    <button class="btn btn-outline-secondary tool-btn" data-tool="text" draggable="true">
                        <i class="bi bi-type"></i>
                    </button>

                    <!-- Chair -->
                    <button class="btn btn-outline-secondary tool-btn" data-tool="chair" draggable="true">
                        <i class="bi bi-chair"></i>
                    </button>

                    <!-- Comment -->
                    <button class="btn btn-outline-secondary tool-btn" data-tool="comment" draggable="true">
                        <i class="bi bi-chat-left-text"></i>
                    </button>

                    <!-- Toggle Grid -->
                    <button class="btn btn-outline-secondary" id="toggleGrid">
                        <i class="bi bi-grid"></i>
                    </button>

                    <!-- Clear Canvas -->
                    <button class="btn btn-outline-danger" id="clearBtn">
                        <i class="bi bi-trash"></i>
                    </button>

                    <div class="vr mx-2"></div>

                    <!-- Undo / Redo -->
                    <button class="btn btn-outline-secondary" id="btnUndoBlueprint" title="Undo (Ctrl+Z)" disabled>
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                    <button class="btn btn-outline-secondary" id="btnRedoBlueprint" title="Redo (Ctrl+Y)" disabled>
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>

                    <div class="vr mx-2"></div>

                    <!-- Bulk Add -->
                    <button class="btn btn-outline-secondary"
                            data-bs-toggle="modal"
                            data-bs-target="#bulkAddModal"
                            title="Bulk Add">
                        <i class="bi bi-collection"></i>
                    </button>

                    <!-- Save Blueprint -->
                    <button class="btn btn-primary ms-2" id="savePlanBtn">Save</button>
                </div>
            </div>
            <!-- /MAP VIEW -->

        </div>
        <!-- /tab-content -->

    </div>
    <!-- /seatPlannerMainContent -->

    <!-- ══════════════════════════════════════════
        BULK ADD MODAL
    ══════════════════════════════════════════ -->
    <div class="modal fade" id="bulkAddModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content"
                style="background-color: var(--bg-panel); color: var(--text-main);">

                <div class="modal-header" style="border-bottom-color: var(--border-color);">
                    <h6 class="modal-title">Bulk Add</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="mb-3">
                        <label for="bulkType" class="form-label" style="color: var(--text-muted);">Type</label>
                        <select class="form-select" id="bulkType"
                                style="background-color: var(--bg-panel);
                                    border-color: var(--border-color);
                                    color: var(--text-main);">
                            <option value="chair">Chairs</option>
                            <option value="rect">Tables (Rect)</option>
                            <option value="circle">Tables (Circle)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="bulkQty" class="form-label" style="color: var(--text-muted);">Quantity</label>
                        <input type="number" class="form-control" id="bulkQty"
                            value="10" min="1" max="100"
                            style="background-color: var(--bg-panel);
                                    border-color: var(--border-color);
                                    color: var(--text-main);">
                    </div>
                    <button type="button"
                            class="btn btn-primary w-100"
                            id="confirmBulkAdd"
                            data-bs-dismiss="modal"
                            style="background-color: var(--primary); border-color: var(--primary);">
                        Add Items
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- ══════════════════════════════════════════
         VISIBILITY SCRIPT
    ══════════════════════════════════════════ -->
    <script>
        (function () {
            if (window.seatPlannerVisibilityInitialized) {
                updateSeatPlannerVisibility();
                return;
            }
            window.seatPlannerVisibilityInitialized = true;

            function updateSeatPlannerVisibility() {
                const emptyState  = document.getElementById('seatPlannerEmptyState');
                const mainContent = document.getElementById('seatPlannerMainContent');
                if (!emptyState || !mainContent) return;

                const events = (typeof MockDB !== 'undefined' && MockDB.getEvents)
                    ? MockDB.getEvents() : [];

                if (Array.isArray(events) && events.length === 0) {
                    mainContent.style.display = 'none';
                    emptyState.style.display  = 'block';
                } else {
                    mainContent.style.display = 'block';
                    emptyState.style.display  = 'none';
                }
            }

            updateSeatPlannerVisibility();
            window.addEventListener('db-events-updated', updateSeatPlannerVisibility);
        })();
    </script>
</div>
