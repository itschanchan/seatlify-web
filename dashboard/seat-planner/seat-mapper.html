<!-- ══════════════════════════════════════════
     MAP (BLUEPRINT) VIEW — partial fragment
     Loaded into #mapViewPartial inside seat-mapper.html
     by the app's routing / partial-injection system.
══════════════════════════════════════════ -->

<style>
    /* ── Grid background (applied on map tab canvas) ── */
    .grid-background {
        background-image:
            linear-gradient(to right, var(--border-color) 1px, transparent 1px),
            linear-gradient(to bottom, var(--border-color) 1px, transparent 1px);
        background-size: 25px 25px;
    }

    /* ── Drag-over indicator on map canvas ── */
    .seat-planner-container.drag-over {
        border: 2px dashed var(--primary) !important;
    }

    /* ── Blueprint chair shape ── */
    .shape.chair {
        background-color: var(--color-text-muted);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        box-sizing: border-box;
    }
    .shape.chair.available {
        background-color: var(--bg-panel);
        border: 1px solid var(--bs-success);
        color: var(--text-main);
        box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    /* ── Canvas Inner ── */
    .canvas-inner {
        position: relative;
        min-width: 100%;
        min-height: 100%;
        transform-origin: 0 0;
    }

    /* ── General Shape ── */
    .shape {
        position: absolute;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        user-select: none;
    }
    .shape:active { cursor: grabbing; }
    .shape.selected {
        outline: 2px solid #0d6efd;
        z-index: 100;
    }

    /* ── Specific Shapes ── */
    .shape.rect {
        border: 2px solid var(--text-main);
        background-color: var(--bg-muted);
    }
    .shape.circle {
        border: 2px solid var(--text-main);
        border-radius: 50%;
        background-color: var(--bg-muted);
    }
    .shape.text, .shape.comment {
        border: 1px dashed transparent;
        background: transparent;
        white-space: nowrap;
        padding: 4px;
    }
    .shape.text:hover, .shape.comment:hover { border-color: var(--border-color); }

    /* ── Resizers ── */
    .resizer { width: 10px; height: 10px; background: #0d6efd; position: absolute; border-radius: 50%; display: none; z-index: 101; }
    .shape.selected .resizer { display: block; }
    .resizer.tl { top: -5px; left: -5px; cursor: nw-resize; }
    .resizer.tr { top: -5px; right: -5px; cursor: ne-resize; }
    .resizer.bl { bottom: -5px; left: -5px; cursor: sw-resize; }
    .resizer.br { bottom: -5px; right: -5px; cursor: se-resize; }
    .resizer.t { top: -5px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
    .resizer.b { bottom: -5px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
    .resizer.l { top: 50%; left: -5px; transform: translateY(-50%); cursor: w-resize; }
    .resizer.r { top: 50%; right: -5px; transform: translateY(-50%); cursor: e-resize; }

    /* ── Grab cursor for panning ── */
    .seat-planner-container[data-active-tool="select"] {
        cursor: grab;
    }
</style>

<!-- CANVAS WRAPPER -->
<div class="position-relative w-100 flex-grow-1">
    <div class="shadow-sm border rounded overflow-auto h-100">
        <!-- CANVAS -->
        <div class="seat-planner-container grid-background h-100"
            id="canvas"
            style="border: none; background-color: var(--bg-panel);">
            <div class="canvas-inner" id="canvasInner"></div>
        </div>
    </div>

    <!-- ZOOM CONTROLS -->
    <div class="zoom-controls-container">
        <div class="zoom-controls">
            <button id="zoomIn"
                    class="btn btn-sm border"
                    style="background-color: var(--bg-panel);
                           color: var(--text-main);
                           border-color: var(--border-color);">+</button>
            <button id="zoomOut"
                    class="btn btn-sm border"
                    style="background-color: var(--bg-panel);
                           color: var(--text-main);
                           border-color: var(--border-color);">−</button>
        </div>
    </div>
</div>

<!-- TOOLBAR -->
<div class="btn-toolbar gap-1 justify-content-center flex-wrap p-2 rounded shadow-sm border mt-3"
     id="seatPlannerToolbar"
     style="background-color: var(--bg-panel);
            border-color: var(--border-color) !important;
            flex-shrink: 0;">

    <!-- Select -->
    <button class="btn btn-outline-secondary tool-btn active" data-tool="select">
        <i class="bi bi-cursor-fill"></i>
    </button>

    <!-- Rectangle + Circle Dropdown -->
    <div class="btn-group">
        <button class="btn btn-outline-secondary tool-btn"
                id="shapeMainBtn"
                data-tool="rect"
                draggable="true">
            <i id="shapeMainIcon" class="bi bi-square"></i>
        </button>

        <button class="btn btn-outline-secondary dropdown-toggle dropdown-toggle-split"
                data-bs-toggle="dropdown"></button>

        <ul class="dropdown-menu">
            <li>
                <button class="dropdown-item shape-option"
                        data-tool="rect"
                        data-icon="bi-square"
                        draggable="true">
                    <i class="bi bi-square me-2"></i> Rectangle
                </button>
            </li>
            <li>
                <button class="dropdown-item shape-option"
                        data-tool="circle"
                        data-icon="bi-circle"
                        draggable="true">
                    <i class="bi bi-circle me-2"></i> Circle
                </button>
            </li>
        </ul>
    </div>

    <!-- Text -->
    <button class="btn btn-outline-secondary tool-btn" data-tool="text" draggable="true">
        <i class="bi bi-type"></i>
    </button>

    <!-- Chair -->
    <button class="btn btn-outline-secondary tool-btn" data-tool="chair" draggable="true">
        <i class="bi bi-chair"></i>
    </button>

    <!-- Comment -->
    <button class="btn btn-outline-secondary tool-btn" data-tool="comment" draggable="true">
        <i class="bi bi-chat-left-text"></i>
    </button>

    <!-- Toggle Grid -->
    <button class="btn btn-outline-secondary" id="toggleGrid">
        <i class="bi bi-grid"></i>
    </button>

    <!-- Clear Canvas -->
    <button class="btn btn-outline-danger" id="clearBtn">
        <i class="bi bi-trash"></i>
    </button>

    <div class="vr mx-2"></div>

    <!-- Undo / Redo -->
    <button class="btn btn-outline-secondary" id="btnUndoBlueprint" title="Undo (Ctrl+Z)" disabled>
        <i class="bi bi-arrow-counterclockwise"></i>
    </button>
    <button class="btn btn-outline-secondary" id="btnRedoBlueprint" title="Redo (Ctrl+Y)" disabled>
        <i class="bi bi-arrow-clockwise"></i>
    </button>

    <div class="vr mx-2"></div>

    <!-- Bulk Add -->
    <button class="btn btn-outline-secondary"
            data-bs-toggle="modal"
            data-bs-target="#bulkAddModal"
            title="Bulk Add">
        <i class="bi bi-collection"></i>
    </button>

    <!-- Save Blueprint -->
    <button class="btn btn-secondary ms-2" id="editPlanBtn" style="display: none;">Edit</button>
    <button class="btn btn-primary ms-2" id="savePlanBtn">Save</button>
</div>

<!-- ══════════════════════════════════════════
     BULK ADD MODAL
══════════════════════════════════════════ -->
<div class="modal fade" id="bulkAddModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content"
             style="background-color: var(--bg-panel); color: var(--text-main);">

            <div class="modal-header" style="border-bottom-color: var(--border-color);">
                <h6 class="modal-title">Bulk Add</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label for="bulkType" class="form-label" style="color: var(--text-muted);">Type</label>
                    <select class="form-select" id="bulkType"
                            style="background-color: var(--bg-panel);
                                   border-color: var(--border-color);
                                   color: var(--text-main);">
                        <option value="chair">Chairs</option>
                        <option value="rect">Tables (Rect)</option>
                        <option value="circle">Tables (Circle)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="bulkQty" class="form-label" style="color: var(--text-muted);">Quantity</label>
                    <input type="number" class="form-control" id="bulkQty"
                           value="10" min="1" max="100"
                           style="background-color: var(--bg-panel);
                                  border-color: var(--border-color);
                                  color: var(--text-main);">
                </div>
                <button type="button"
                        class="btn btn-primary w-100"
                        id="confirmBulkAdd"
                        data-bs-dismiss="modal"
                        style="background-color: var(--primary); border-color: var(--primary);">
                    Add Items
                </button>
            </div>

        </div>
    </div>
</div>
