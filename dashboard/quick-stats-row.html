<!-- Quick Stats Row -->
<div class="row g-4 mb-4">

    <!-- Seats / Capacity -->
    <div class="col-12 col-sm-6 col-md-3">
        <div class="card shadow-sm border-0 h-100 press-card" style="background-color: var(--bg-panel);"
             onclick="document.querySelector('.sidebar-nav .nav-link[data-target=\'seat-planner\']').click()">
            <div class="card-body">
                <p class="mb-1" style="color: var(--text-muted); font-size: 0.8rem;">Seats / Total Capacity</p>
                <h3 id="dashboardSeatsAvailable" class="mb-0" style="color: var(--text-main);">0 / 0</h3>
                <small class="text-success"><i class="bi bi-bar-chart-fill"></i> 0% reserved</small>
            </div>
        </div>
    </div>

    <!-- Checked-in Guests -->
    <div class="col-12 col-sm-6 col-md-3">
        <div class="card shadow-sm border-0 h-100 press-card" style="background-color: var(--bg-panel);"
             onclick="document.querySelector('.sidebar-nav .nav-link[data-target=\'analytics\']').click()">
            <div class="card-body">
                <p class="mb-1" style="color: var(--text-muted);">Checked-in Guests</p>
                <h3 id="dashboardAttendees" class="mb-0" style="color: var(--text-main);">0</h3>
                <small id="dashboardAttendeesPercentage" class="text-muted">0% of total</small>
            </div>
        </div>
    </div>

    <!-- Tickets Sold -->
    <div class="col-12 col-sm-6 col-md-3">
        <div class="card shadow-sm border-0 h-100 press-card" style="background-color: var(--bg-panel);"
             onclick="document.querySelector('.sidebar-nav .nav-link[data-target=\'tickets\']').click()">
            <div class="card-body">
                <p class="mb-1" style="color: var(--text-muted);">Tickets Sold</p>
                <h3 id="dashboardTicketsSold" class="mb-0" style="color: var(--text-main);">0</h3>
                <small id="dashboardTicketsTarget" style="color: var(--text-muted);">Target: 0</small>
            </div>
        </div>
    </div>

    <!-- Revenue -->
    <div class="col-12 col-sm-6 col-md-3">
        <div class="card shadow-sm border-0 h-100 press-card" style="background-color: var(--bg-panel);"
             onclick="document.querySelector('.sidebar-nav .nav-link[data-target=\'finance\']').click()">
            <div class="card-body">
                <p class="mb-1" style="color: var(--text-muted);">Revenue</p>
                <h3 id="dashboardRevenue" class="mb-0" style="color: var(--text-main);">₱0</h3>
                <small class="text-success" style="display: none;"><i class="bi bi-arrow-up-short"></i> 8% increase</small>
            </div>
        </div>
    </div>

</div>
