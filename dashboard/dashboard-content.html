<div class="pb-4 pt-0">
    <!-- Vanilla Calendar Pro -->
    <link href="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vanilla-calendar-pro/build/vanilla-calendar.min.js" defer></script>

    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        @media (min-width: 768px) {
            .search-bar-responsive {
                max-width: 350px !important;
            }
        }
        @keyframes scanLine {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        /* Analytics Styles */
        .analytic-header-container {
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .analytic-header {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .chart-card {
            background-color: var(--bg-panel);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            height: 100%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* Custom styles for Vanilla Calendar Pro */
        .vc-date[data-vc-date-selected] .vc-date__btn {
            background-color: #E53935 !important;
            color: white !important;
        }
        /* Ensure calendar appears above Bootstrap modals (z-index: 1055) */
        .vc-calendar[data-vc-input] {
            z-index: 1060 !important;
        }
        .press-card {
            cursor: pointer;
            transition: transform 0.1s ease-in-out;
        }
        .press-card:active {
            transform: scale(0.95);
        }
    </style>

    <h2 class="mb-4 fw-bold">Dashboard Overview</h2>

    <!-- Empty State -->
    <div id="dashboardEmptyState" class="text-center py-5" style="display: none;">
        <div class="mb-4">
            <i class="bi bi-calendar-plus display-1 text-muted"></i>
        </div>
        <h3 class="text-muted">Add a new event</h3>
        <p class="text-muted mb-4">There are no events in the system.</p>
        <button class="btn btn-primary btn-lg" onclick="openCreateEventModal()">
            <i class="bi bi-plus-circle me-2"></i>Create New Event
        </button>
    </div>

    <div id="dashboardMainContent">

        <!-- Search & Navigation Bar -->
        <div class="d-flex flex-column flex-md-row align-items-center mb-4 gap-3 p-3 rounded shadow-sm" style="background-color: var(--bg-panel);">
            <!-- Search Bar -->
            <div class="input-group search-bar-responsive" style="width: 100%; max-width: 800px;">
                <span class="input-group-text border-end-0" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-muted);"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" placeholder="Search events..." style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main); box-shadow: none;">
                <button class="btn btn-primary" style="background-color: var(--primary); border-color: var(--primary);">Search</button>
            </div>

            <!-- Scan QR Button (Mobile/Tablet Only) -->
            <button class="btn btn-outline-secondary w-50 w-md-auto me-md-2 d-lg-none" title="Scan QR Code" data-bs-toggle="modal" data-bs-target="#qrScannerModal">
                <i class="bi bi-qr-code-scan me-2"></i>Scan QR
            </button>

            <!-- Simulate Sale Button -->
            <button class="btn btn-outline-success w-50 w-md-auto me-md-2" id="btnSimulateSale" title="Simulate Ticket Sale">
                <i class="bi bi-cart-plus me-2"></i>Simulate Sale
            </button>

            <!-- Reset Sale Button -->
            <button class="btn btn-outline-warning w-50 w-md-auto me-md-2" id="btnResetSale" title="Reset Simulated Sales">
                <i class="bi bi-arrow-counterclockwise me-2"></i>Reset Sales
            </button>

            <!-- Create Event Button -->
            <button class="btn btn-primary w-100 w-md-auto" style="background-color: var(--primary); border-color: var(--primary);" onclick="openCreateEventModal()">
                <i class="bi bi-plus-circle me-2"></i>Create New Event
            </button>
        </div>

        <div class="dashboard-wrapper">
            <!-- Managing: Event Selector & Filter Tabs -->
            <div class="d-flex align-items-center mb-3" style="max-width: 100%;">
                <h4 class="mb-0 me-2 flex-shrink-0" style="color: var(--text-muted);">Managing:</h4>

                <div class="dropdown me-3 flex-grow-1" style="min-width: 0;">
                    <button id="dashboardSelectedEvent"
                            class="btn btn-link fw-bold text-decoration-none dropdown-toggle p-0 fs-4 w-100 text-start"
                            style="color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                            type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Select Event
                    </button>
                    <ul id="dashboardEventDropdownList" class="dropdown-menu"
                        style="background-color: var(--bg-panel); border-color: var(--border-color);">
                        <!-- Populated by JS -->
                    </ul>
                </div>

                <ul class="nav nav-pills ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" id="tabCurrent" href="#" style="background-color: var(--primary);">Current</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="tabPast" href="#" style="color: var(--text-muted);">Past Events</a>
                    </li>
                </ul>
            </div>

            <!-- ① Event Details & Countdown — injected by dashboard.js -->
            <div id="event-details-container"></div>

            <!-- ② Quick Stats Row — injected by dashboard.js -->
            <div id="quick-stats-row-container"></div>

        </div><!-- /.dashboard-wrapper -->

        <!-- ③ All Events View — injected by dashboard.js -->
        <div id="all-events-view-container"></div>

        <br><hr>

        <!-- Guest List (injected by dashboard.js) -->
        <div id="guest-list-container" class="mt-4"></div>

        <br><hr>

        <!-- Event Analytics (injected by dashboard.js) -->
        <div id="event-analytics-container" class="mt-5"></div>

    </div><!-- /#dashboardMainContent -->

    <!-- Modals -->
    <div id="createEventModalContainer"></div>
    <div id="editEventModalContainer"></div>

    <!-- QR Scanner Modal -->
    <div class="modal fade" id="qrScannerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--bg-panel); color: var(--text-main);">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title"><i class="bi bi-qr-code-scan me-2"></i>Scan Ticket</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="qr-reader" style="width: 100%;"></div>
                    <p class="text-muted small mt-2">Point camera at QR code</p>
                </div>
            </div>
        </div>
    </div>

</div>
