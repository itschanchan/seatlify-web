<div class="container-fluid pt-0 pb-4 d-flex flex-column">
    <style>
        .nav-pills .nav-link.active {
            background-color: var(--primary) !important;
            color: #fff !important;
        }
        .nav-pills .nav-link {
            color: var(--text-muted);
        }
        #ticketTierRowsContainer .table {
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
        }
        .tier-name-input {
            max-width: 250px;
        }
        @media (max-width: 767.98px) {
            /* Responsive table is now handled by the .table-responsive class */
            .ticket-actions {
                flex-direction: column;
            }
            .ticket-actions .btn {
                width: 100%;
            }
        }
    </style>

    <h2 class="mb-4 fw-bold">Ticket Configuration</h2>


    <!-- Navigation -->
    <ul class="nav nav-pills mb-4" id="ticketTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pills-set-tickets-tab" data-bs-toggle="pill" data-bs-target="#pills-set-tickets" type="button" role="tab" aria-controls="pills-set-tickets" aria-selected="true">Set Tickets</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="pills-design-ticket-tab" data-bs-toggle="pill" data-bs-target="#pills-design-ticket" type="button" role="tab" aria-controls="pills-design-ticket" aria-selected="false">Design Ticket</button>
        </li>
    </ul>

    <div class="tab-content" id="ticketTabsContent">
        <!-- Set Tickets Tab -->
        <div class="tab-pane fade show active" id="pills-set-tickets" role="tabpanel" aria-labelledby="pills-set-tickets-tab">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
                <!-- <h5 class="card-title mb-0 text-main-theme">Ticket Configuration</h5> -->
                <div class="text-muted-theme">
                    Total Seats: <strong id="ticketConfigTotalSeats" class="text-main-theme">0</strong>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <button type="button" class="btn btn-outline-secondary" id="btnEditTicketTiers"><i class="bi bi-pencil-square me-1"></i> Edit</button>
                    <button type="button" class="btn btn-primary" id="btnSaveTicketTiers" style="display: none;"><i class="bi bi-save me-1"></i> Save Configuration</button>
                </div>
            </div>
            
            <!-- Tier Layout Navigation -->
            <ul class="nav nav-pills mb-3 justify-content-center" id="tier-layout-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="pills-rows-tab" data-bs-toggle="pill" data-bs-target="#pills-rows" type="button" role="tab" aria-controls="pills-rows" aria-selected="true">Row Tiers</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="pills-tables-tab" data-bs-toggle="pill" data-bs-target="#pills-tables" type="button" role="tab" aria-controls="pills-tables" aria-selected="false">Table Tiers</button>
                </li>
            </ul>

            <!-- Tier Layout Tab Content -->
            <div class="tab-content" id="tier-layout-tabs-content">
                <div class="tab-pane fade show active" id="pills-rows" role="tabpanel" aria-labelledby="pills-rows-tab">
                    <div id="ticketTierRowsContainer" class="table-responsive d-flex justify-content-center"></div>
                    <div id="rowTiersActions" class="text-center mt-3" style="display: none;">
                        <button class="btn btn-sm btn-outline-primary me-2" id="btnTicketAddRowTier"><i class="bi bi-plus-lg"></i> Add Row</button>
                        <button class="btn btn-sm btn-outline-danger" id="btnTicketRemoveRowTier"><i class="bi bi-dash-lg"></i> Remove Row</button>
                    </div>
                </div>
                <div class="tab-pane fade" id="pills-tables" role="tabpanel" aria-labelledby="pills-tables-tab">
                    <div id="ticketTierTablesContainer" class="table-responsive d-flex justify-content-center"></div>
                    <div id="tableTiersActions" class="text-center mt-3" style="display: none;">
                        <button class="btn btn-sm btn-outline-primary me-2" id="btnTicketAddTableTier"><i class="bi bi-plus-lg"></i> Add Table</button>
                        <button class="btn btn-sm btn-outline-danger" id="btnTicketRemoveTableTier"><i class="bi bi-dash-lg"></i> Remove Table</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Design Ticket Tab -->
        <div class="tab-pane fade" id="pills-design-ticket" role="tabpanel" aria-labelledby="pills-design-ticket-tab">
            <div class="ticket-container">
                <div class="ticket-header-container">
                    <h1 class="ticket-header">Your Ticket Details</h1>
                </div>

                <div class="qr-code-container">
                    <div class="qr-code-square"></div>
                </div>

                <div class="ticket-divider"></div>

                <div class="ticket-info-container">
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Event:</span>
                        <span class="ticket-info-value" id="ticketEventTitle">-</span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Date:</span>
                        <span class="ticket-info-value" id="ticketEventDate">-</span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Time:</span>
                        <span class="ticket-info-value" id="ticketEventTime">-</span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Venue:</span>
                        <span class="ticket-info-value" id="ticketEventVenue">-</span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Seat:</span>
                        <span class="ticket-info-value">Section A, Row 5, Seat 12</span>
                    </div>
                    <div class="ticket-info-row">
                        <span class="ticket-info-label">Price:</span>
                        <span class="ticket-info-value" id="ticketEventPrice">-</span>
                    </div>
                </div>

                <!-- <div class="mt-4">
                    <button id="btnSendTestEmail" class="btn btn-outline-primary w-100">
                        <i class="bi bi-envelope-paper me-2"></i> Email Ticket
                    </button>
                </div> -->
            </div>
        </div>
    </div>
</div>

<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
    (function() {
        // 1. Initialize EmailJS
        // Using the key found in your public-view-invitation.html
        if (typeof emailjs !== 'undefined') {
            emailjs.init('NPeF-dURRp7hqBu-y');
        }

        const eventId = localStorage.getItem('seatlify_current_event_id');
        let currentEventData = null;

        /* ═══════════════════════════════════════════════════════
           TICKET TIER RENDERER
           Reads row_layout_data / table_layout_data from the
           event and fills #ticketTierRowsContainer and
           #ticketTierTablesContainer automatically.
        ═══════════════════════════════════════════════════════ */
        function renderTicketTiers(event) {
            renderTierTable(
                event.row_layout_data   || [],
                '#ticketTierRowsContainer',
                event,
                'row'
            );
            renderTierTable(
                event.table_layout_data || [],
                '#ticketTierTablesContainer',
                event,
                'table'
            );
        }

        function renderTierTable(layoutData, containerSelector, event, mode) {
            const container = document.querySelector(containerSelector);
            if (!container) return;

            // Update the total-seats badge
            const totalSeatsEl = document.getElementById('ticketConfigTotalSeats');
            if (totalSeatsEl) {
                totalSeatsEl.textContent = parseInt(event.total_seats) || 0;
            }

            if (!layoutData.length) {
                container.innerHTML =
                    `<p class="text-muted text-center py-3">No ${mode === 'table' ? 'table' : 'row'} layout configured for this event.</p>`;
                return;
            }

            // Build a lookup from ticket name → price
            const priceMap = {};
            (event.tickets || []).forEach(t => {
                priceMap[t.name]          = t.price;
                priceMap[t.original_name] = t.price;
            });

            const totalAllocated = layoutData.reduce((s, g) => s + (parseInt(g.seats) || 0), 0);

            const table = document.createElement('table');
            table.className = 'table table-bordered table-sm align-middle mb-0';
            table.style.minWidth = '420px';
            table.innerHTML = `
                <thead>
                    <tr style="background-color: var(--bg-muted); color: var(--text-muted);">
                        <th>#</th>
                        <th>${mode === 'table' ? 'Table' : 'Row / Tier'}</th>
                        <th>Seats</th>
                        <th>Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${layoutData.map((group, idx) => {
                        const price  = priceMap[group.label] ?? (event.is_paid ? '—' : 'Free');
                        const priceDisplay = event.is_paid && price !== '—' && price !== 'Free'
                            ? `₱${price}` : (event.is_paid ? '—' : 'Free');
                        return `
                        <tr>
                            <td class="text-muted">${idx + 1}</td>
                            <td><strong>${group.label}</strong></td>
                            <td>${group.seats}</td>
                            <td>${priceDisplay}</td>
                            <td><span class="badge bg-success">Active</span></td>
                        </tr>`;
                    }).join('')}
                </tbody>
                <tfoot>
                    <tr class="fw-bold" style="background-color: var(--bg-muted);">
                        <td colspan="2" class="text-end">Total</td>
                        <td>${totalAllocated}</td>
                        <td colspan="2"></td>
                    </tr>
                </tfoot>
            `;
            container.innerHTML = '';
            container.appendChild(table);
        }

        /* ═══════════════════════════════════════════════════════
           LOAD EVENT DATA
        ═══════════════════════════════════════════════════════ */
        /* ═══════════════════════════════════════════════════════
           LOAD EVENT DATA
           Priority: MockDB (in-memory, always up-to-date) →
                     backend API (fallback for production)
        ═══════════════════════════════════════════════════════ */
        function loadEventData(id) {
            // 1. Try MockDB first (available in the SPA / demo environment)
            if (typeof MockDB !== 'undefined') {
                const ev = MockDB.getEvents().find(e => e.event_id == id);
                if (ev) {
                    currentEventData = ev;
                    populateTicketPreview(ev);
                    renderTicketTiers(ev);
                    return;
                }
            }

            // 2. Fall back to the PHP backend (production)
            const isLiveServer = window.location.port === '5500';
            const apiBase = isLiveServer
                ? 'http://localhost/seatlify/backend'
                : '/seatlify/backend';

            fetch(`${apiBase}/get_event_public.php?event_id=${id}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.event) {
                        currentEventData = data.event;
                        populateTicketPreview(data.event);
                        renderTicketTiers(data.event);
                    }
                })
                .catch(err => console.error('Error loading event for ticket:', err));
        }

        if (eventId) loadEventData(eventId);

        // ── Auto-sync: refresh when the event is created / edited ────
        // event-creator.js and edit-event-modal.html both fire this
        // custom event after persisting new layout / tier data.
        window.addEventListener('seatlify:layout-changed', (e) => {
            const currentId = localStorage.getItem('seatlify_current_event_id');
            if (!currentId) return;
            // Reload regardless of which event fired — active event may
            // have just been set by the create flow.
            loadEventData(currentId);
        });

        function populateTicketPreview(event) {
            const titleEl = document.getElementById('ticketEventTitle');
            const dateEl = document.getElementById('ticketEventDate');
            const timeEl = document.getElementById('ticketEventTime');
            const venueEl = document.getElementById('ticketEventVenue');
            const priceEl = document.getElementById('ticketEventPrice');

            if (titleEl) titleEl.textContent = event.title;
            
            const start = new Date(event.start_datetime);
            if (dateEl) dateEl.textContent = start.toLocaleDateString();
            if (timeEl) timeEl.textContent = start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            const venueName = event.venue_name || 'Unknown Venue';
            if (venueEl) venueEl.textContent = venueName;

            if (priceEl) {
                if (event.is_paid && event.tickets && event.tickets.length > 0) {
                    priceEl.textContent = `₱${event.tickets[0].price}`;
                } else {
                    priceEl.textContent = 'Free';
                }
            }

            // Also populate the QR code preview in the "Design Ticket" tab
            const qrContainer = document.querySelector('#pills-design-ticket .qr-code-container');
            if (qrContainer) {
                const qrData = `EVENT:${event.event_id}|PREVIEW`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
                // Replace the placeholder square with the actual QR image
                qrContainer.innerHTML = `<img src="${qrUrl}" alt="QR Code Preview" class="img-fluid rounded" style="max-width: 150px;">`;
            }
        }

        // 3. Handle "Email Ticket" Button
        const btnEmail = document.getElementById('btnSendTestEmail');
        if (btnEmail) {
            btnEmail.addEventListener('click', function() {
                if (!currentEventData) {
                    alert('No event data loaded. Please select an event first.');
                    return;
                }

                const email = prompt("Enter email address to send test ticket to:");
                if (!email) return;

                const originalText = this.innerHTML;
                this.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';
                this.disabled = true;

                // Generate QR URL for the test
                const checkinUrlBase = 'https://seatlify.web.app/checkin';
                const guestId = `TEST-${Date.now()}`; // A unique ID for the test ticket
                const qrData = `${checkinUrlBase}?event_id=${currentEventData.event_id}&guest_id=${guestId}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;

                // Format Dates
                const startDate = new Date(currentEventData.start_datetime);
                const endDate = currentEventData.end_datetime ? new Date(currentEventData.end_datetime) : null;
                
                // Prepare params for EmailJS
                const templateParams = {
                    to_email: email, // Required for sending
                    attendee_name: "Test User",
                    ticket_id: guestId,
                    qr_code_url: qrUrl,
                    event_name: currentEventData.title,
                    event_date: startDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
                    event_start_time: startDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    event_end_time: endDate ? endDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '',
                    event_venue: currentEventData.venue_name || 'Unknown Venue',
                    seat_label: "Section A, Row 5, Seat 12 (Test)"
                };

                const serviceID = 'service_ryl56ps';
                const templateID = 'template_5i46vh8';

                emailjs.send(serviceID, templateID, templateParams)
                    .then(() => {
                        alert('Test ticket sent successfully!');
                        this.innerHTML = originalText;
                        this.disabled = false;
                    })
                    .catch((err) => {
                        console.error('EmailJS Error:', err);
                        alert('Failed to send email: ' + JSON.stringify(err));
                        this.innerHTML = originalText;
                        this.disabled = false;
                    });
            });
        }
    })();
</script>
