<div class="container-fluid pt-0 pb-4 d-flex flex-column">
    <style>
        .invitation-preview-wrapper [contenteditable="true"] {
            outline: 2px dashed transparent;
            transition: outline 0.2s ease-in-out;
        }
        .invitation-preview-wrapper [contenteditable="true"]:hover,
        .invitation-preview-wrapper [contenteditable="true"]:focus {
            outline-color: var(--primary);
            background-color: rgba(var(--primary-rgb), 0.05);
        }
        .invitation-section {
            position: relative;
            border: 1px dashed var(--border-color);
            margin-bottom: 1.5rem;
            border-radius: 8px;
            background-color: var(--bg-panel);
            overflow: hidden;
        }
        .invitation-section:hover .section-drag-handle {
            opacity: 1;
        }
        .section-drag-handle {
            opacity: 1;
            transition: opacity 0.2s;
            cursor: grab;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
        }
        @media (max-width: 767.98px) {
            .invitation-banner img {
                height: 200px !important;
            }
            .invitation-title {
                font-size: 2rem !important;
            }
        }
        .invitation-banner .banner-upload-btn-container {
            opacity: 0;
            transition: opacity .3s ease;
            z-index: 2; /* Ensure it's above the image */
        }
        .invitation-banner:hover .banner-upload-btn-container {
            opacity: 1;
        }
        .invitation-banner:hover > img {
            filter: brightness(0.6);
            transition: filter .3s ease;
        }
        .form-field-item[data-field-type="seat"] .dropdown-item.active,
        .form-field-item[data-field-type="seat"] .dropdown-item:active {
            background-color: #dc3545 !important;
        }
    </style>

    <h2 class="mb-4 fw-bold">Invitations Designer</h2>

    <!-- Toolbar Placeholder -->
    <div id="invitations-designer-tools-container"></div>

    <!-- Invitation Preview -->
    <div class="row">
        <!-- Invitation Editor/Preview -->
        <div class="col-12">
            <div id="invitationDesigner" class="invitation-preview-wrapper mx-auto" style="max-width: 800px;">
        <div id="invitationSectionsContainer">

    <!-- DEFAULT -->
    <!-- ========================= -->
    <!-- SECTION 1 -->
    <!-- ========================= -->
    <div class="invitation-section p-4 p-md-5" data-section="main_details" data-type="section">

        <div class="section-drag-handle position-absolute top-0 start-0 m-2 p-2 rounded shadow-sm text-secondary">
            <i class="bi bi-grip-vertical"></i>
        </div>

        <h3 contenteditable="true" class="mb-3" style="color: var(--text-main);">Invitation Details</h3>

        <div class="section-blocks-container p-3 border rounded" style="background-color: var(--bg-muted);">

            <!-- BANNER BLOCK -->
            <div class="invitation-section" data-section="banner" data-type="banner">
                <div class="section-drag-handle position-absolute top-0 start-0 m-2 p-2 rounded shadow-sm text-secondary" style="z-index: 10;">
                    <i class="bi bi-grip-vertical"></i>
                </div>
                <div class="invitation-banner position-relative bg-light">
                    <img id="bannerImagePreview_default" src="https://images.pexels.com/photos/28216688/pexels-photo-28216688.png" class="img-fluid" style="object-fit: cover; width: 100%; height: 300px;">
                    <div class="position-absolute top-50 start-50 translate-middle banner-upload-btn-container">
                        <label for="bannerUpload_default" class="btn btn-sm btn-light bg-white shadow-sm">
                            <i class="bi bi-upload me-1"></i> Change Banner
                        </label>
                        <input type="file" id="bannerUpload_default" class="d-none" accept="image/*">
                    </div>
                </div>
            </div>

            <!-- HEADER BLOCK -->
            <div class="invitation-section p-4 p-md-5" data-section="header" data-type="header">

                <div class="section-drag-handle position-absolute top-0 start-0 m-2 p-2 rounded shadow-sm text-secondary">
                    <i class="bi bi-grip-vertical"></i>
                </div>

                <h1 id="invDesignTitle" contenteditable="true"
                    class="invitation-title display-4 mb-3"
                    style="color: var(--text-main);">
                    Event Title
                </h1>

                <p id="invDesignHost" contenteditable="true"
                   class="lead"
                   style="color: var(--text-muted);">
                    Hosted by:
                    <span class="fw-bold" style="color: var(--text-main);">
                        Your Organization
                    </span>
                </p>

                <hr class="my-4" style="border-color: var(--border-color);">

                <div id="invDesignDesc"
                     contenteditable="true"
                     class="invitation-description mb-4 fs-5"
                     style="color: var(--text-main);">

                    <p>
                        Join us for an exclusive event where we will unveil our latest
                        innovations and celebrate a year of success.
                    </p>

                </div>

            </div>


            <!-- EVENT DETAILS BLOCK -->
            <div class="invitation-section p-4 p-md-5" data-section="details" data-type="details">

                <div class="section-drag-handle position-absolute top-0 start-0 m-2 p-2 rounded shadow-sm text-secondary">
                    <i class="bi bi-grip-vertical"></i>
                </div>

                <div class="card mb-4 border-0" style="background-color: var(--bg-muted);">

                    <div class="card-body">

                        <h5 class="card-title" style="color: var(--text-main);">
                            When & Where
                        </h5>

                        <p id="invDesignDate" class="card-text mb-0"
                           style="color: var(--text-main);">
                            <i class="bi bi-calendar3 me-2"></i>
                        </p>

                        <p id="invDesignTime" class="card-text mb-2"
                           style="color: var(--text-muted);">
                            <i class="bi bi-clock me-2"></i>
                        </p>

                        <p id="invDesignVenue" class="card-text"
                           style="color: var(--text-main);">
                            <i class="bi bi-geo-alt-fill me-2"></i>
                        </p>

                    </div>

                </div>

            </div>

            <!-- FORM BLOCK -->
            <div class="invitation-section p-4 p-md-5"
                 data-section="rsvp_form"
                 data-type="rsvp_form">

                <div class="section-drag-handle position-absolute top-0 start-0 m-2 p-2 rounded shadow-sm text-secondary">
                    <i class="bi bi-grip-vertical"></i>
                </div>

                <div class="form-builder-wrapper p-4 rounded"
                     style="background-color: var(--bg-muted);">

                    <h4 contenteditable="true"
                        class="mb-3 form-title"
                        style="color: var(--text-main);">

                        Please confirm your details:

                    </h4>

                    <div class="form-fields-list"></div>

                    <div class="d-grid mt-3">
                        <button class="btn btn-primary" disabled>Confirm RSVP</button>
                    </div>

                    <div class="d-flex gap-2 mt-3 border-top pt-3"
                         style="border-color: var(--border-color) !important;">

                        <button class="btn btn-sm btn-outline-secondary btn-add-form-field">
                            <i class="bi bi-plus"></i> Add Text Field
                        </button>

                        <button class="btn btn-sm btn-outline-primary btn-add-seat-res">
                            <i class="bi bi-grid-3x3"></i> Add Seat Reservation
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    </div> <!-- closes invitation-section (section_rsvp) -->
</div> <!-- closes invitationSectionsContainer -->
</div> <!-- closes invitationDesigner -->
</div> <!-- closes col-12 -->
</div> <!-- closes row -->
</div> <!-- closes container-fluid -->

<!-- Container for the dynamically loaded modal -->
<div id="invitationPreviewModalContainer"></div>

<!-- Container for the Save & Share modal -->
<div id="saveShareModalContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script src="../js/invitations-builder.js"></script>
<script src="../js/invitations-save.js"></script>
<script src="../js/invitations-designer.js"></script>
