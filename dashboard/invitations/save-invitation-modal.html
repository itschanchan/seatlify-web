<!-- Save & Share Modal -->
<div class="modal fade" id="saveShareModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background-color: var(--bg-panel); color: var(--text-main);">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title">Invitation Saved!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted mb-3">Your invitation has been saved successfully. Share this link with your guests:</p>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="shareLinkInput" readonly style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    <button class="btn btn-outline-primary" type="button" id="btnCopyLink">
                        <i class="bi bi-clipboard"></i> Copy
                    </button>
                </div>
                <hr class="my-3" style="border-color: var(--border-color);">
                <label for="inviteEmailInput" class="form-label text-muted">Send via Email</label>
                <div class="input-group">
                    <input type="email" class="form-control" id="inviteEmailInput" placeholder="guest@example.com" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    <button class="btn btn-outline-primary" type="button" id="btnSendInvite">
                        <i class="bi bi-send"></i> Send
                    </button>
                </div>
                <div class="alert alert-success py-2 d-none" id="copySuccessAlert">
                    <small><i class="bi bi-check-circle me-1"></i> Link copied to clipboard!</small>
                </div>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
