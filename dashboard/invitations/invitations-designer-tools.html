<!-- Editor Header & Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3 p-3 rounded shadow-sm" style="background-color: var(--bg-panel);">
    <!-- Left Group: Tools and History -->
    <div class="d-flex flex-wrap align-items-center gap-2">
        <!-- Toolbox Buttons -->
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="banner" title="Banner Image">
            <i class="bi bi-card-image"></i> <span class="d-none d-md-inline">Banner</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="header" title="Header & Description">
            <i class="bi bi-fonts"></i> <span class="d-none d-md-inline">Header</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="section" title="Text Section">
            <i class="bi bi-layout-text-window-reverse"></i> <span class="d-none d-md-inline">Section</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="image" title="Picture">
            <i class="bi bi-image"></i> <span class="d-none d-md-inline">Picture</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="details" title="Venue & Date">
            <i class="bi bi-calendar-event"></i> <span class="d-none d-md-inline">Details</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="form" title="Form Builder">
            <i class="bi bi-ui-checks"></i> <span class="d-none d-md-inline">Form</span>
        </button>
        <button class="btn btn-outline-secondary d-flex align-items-center gap-2 draggable-tool" draggable="true" data-type="question" title="Question">
            <i class="bi bi-question-circle"></i> <span class="d-none d-md-inline">Question</span>
        </button>

        <!-- Separator -->
        <div class="vr mx-2"></div>
        
        <!-- History Buttons -->
        <button id="btnUndoInvitation" class="btn btn-outline-secondary" title="Undo (Ctrl+Z)" disabled><i class="bi bi-arrow-counterclockwise"></i></button>
        <button id="btnRedoInvitation" class="btn btn-outline-secondary" title="Redo (Ctrl+Y)" disabled><i class="bi bi-arrow-clockwise"></i></button>
    </div>
    
    <!-- Right Group: Main Actions -->
    <div class="d-flex gap-2">
        <button id="btnPreviewInvitation" class="btn btn-outline-secondary"><i class="bi bi-eye me-1"></i> Preview</button>
        <button id="btnSaveInvitation" class="btn btn-primary"><i class="bi bi-link-45deg me-1"></i> Save & Get Link</button>
    </div>
</div>

<script>
    // --- History Manager ---
    const historyManager = {
        undoStack: [],
        redoStack: [],
        maxHistory: 30,
        rebindCallback: () => {},

        init: function(rebindCallback) {
            this.rebindCallback = rebindCallback;
        },

        saveState: function() {
            const container = document.getElementById('invitationSectionsContainer');
            if (!container) return;
            const currentState = container.innerHTML;
            
            if (this.undoStack.length > 0 && this.undoStack[this.undoStack.length - 1] === currentState) {
                return;
            }

            this.redoStack = [];
            this.undoStack.push(currentState);

            if (this.undoStack.length > this.maxHistory) {
                this.undoStack.shift();
            }
            this.updateButtons();
        },

        undo: function() {
            if (this.undoStack.length <= 1) return;
            
            const container = document.getElementById('invitationSectionsContainer');
            if (!container) return;

            this.redoStack.push(container.innerHTML);
            container.innerHTML = this.undoStack.pop();
            if(typeof this.rebindCallback === 'function') this.rebindCallback();
            this.updateButtons();
        },

        redo: function() {
            if (this.redoStack.length === 0) return;

            const container = document.getElementById('invitationSectionsContainer');
            if (!container) return;

            this.undoStack.push(container.innerHTML);
            container.innerHTML = this.redoStack.pop();
            if(typeof this.rebindCallback === 'function') this.rebindCallback();
            this.updateButtons();
        },
        
        clear: function() {
            this.undoStack = [];
            this.redoStack = [];
            this.updateButtons();
        },

        updateButtons: function() {
            const btnUndo = document.getElementById('btnUndoInvitation');
            const btnRedo = document.getElementById('btnRedoInvitation');
            if(btnUndo) btnUndo.disabled = this.undoStack.length <= 1;
            if(btnRedo) btnRedo.disabled = this.redoStack.length === 0;
        }
    };

    // --- Toolbar Drag & Drop Logic ---
    function bindToolbarDragAndDrop() {
        const toolbarItems = document.querySelectorAll('.draggable-tool');
        toolbarItems.forEach(item => {
            item.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('toolType', item.dataset.type);
                e.dataTransfer.effectAllowed = 'copy';
            });
        });
    }

    // --- Toolbar Button Click Logic ---
    function bindUndoRedoControls() {
        const btnUndo = document.getElementById('btnUndoInvitation');
        const btnRedo = document.getElementById('btnRedoInvitation');

        if (btnUndo) btnUndo.addEventListener('click', () => historyManager.undo());
        if (btnRedo) btnRedo.addEventListener('click', () => historyManager.redo());

        // Bind keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Don't trigger shortcuts if user is typing in an input or editable element
            if (e.target.isContentEditable || ['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
                return;
            }
            if (e.ctrlKey && e.key.toLowerCase() === 'z' && !e.shiftKey) {
                e.preventDefault();
                historyManager.undo();
            } else if (e.ctrlKey && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) {
                e.preventDefault();
                historyManager.redo();
            }
        });
    }

    function bindPreviewButton() {
        const previewBtn = document.getElementById('btnPreviewInvitation');
        const designer = document.getElementById('invitationDesigner');
        const modalEl = document.getElementById('invitationPreviewModal');
        
        if (!previewBtn || !designer || !modalEl) return;

        const modal = new bootstrap.Modal(modalEl);
        const previewWrapper = document.getElementById('previewContentWrapper');

        previewBtn.addEventListener('click', () => {
            const previewNode = designer.cloneNode(true);

            // Clean up the cloned node for a pure preview
            previewNode.removeAttribute('id');
            previewNode.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));

            previewNode.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.removeAttribute('contenteditable');
                el.style.outline = 'none';
                el.style.backgroundColor = '';
            });
            previewNode.querySelector('.position-absolute.top-0.end-0')?.remove();
            previewNode.querySelectorAll('.section-drag-handle').forEach(el => el.remove());
            previewNode.querySelectorAll('.btn-delete-section').forEach(el => el.remove());

            previewNode.style.backgroundColor = 'var(--bg-panel)';
            previewNode.style.borderRadius = '12px';
            previewNode.style.boxShadow = '0 10px 30px rgba(0,0,0,0.1)';
            previewNode.style.overflow = 'hidden';

            previewNode.querySelectorAll('.invitation-section').forEach(el => {
                el.style.border = 'none';
                el.style.margin = '0';
                el.style.borderRadius = '0';
                el.style.backgroundColor = 'transparent';
            });

            previewWrapper.innerHTML = '';
            previewWrapper.appendChild(previewNode);
            modal.show();
        });
    }
</script>
