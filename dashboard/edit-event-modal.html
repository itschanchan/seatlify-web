<!-- Edit Event Modal -->
<div class="modal fade" id="editEventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content" style="background-color: var(--bg-panel); color: var(--text-main);">
            <div class="modal-header border-bottom-0">
                <h5 class="modal-title">Edit Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editEventForm">
                    <input type="hidden" id="editEventId">
                    <div class="mb-3">
                        <label for="editEventName" class="form-label" style="color: var(--text-muted);">Event Name</label>
                        <input type="text" class="form-control" id="editEventName" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    </div>
                    <div class="row">
                        <div class="col-12 col-md-4 mb-3">
                            <label for="editEventDate" class="form-label" style="color: var(--text-muted);">Date</label>
                            <input type="text" class="form-control" id="editEventDate" placeholder="Select Date" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-6 col-md-4 mb-3">
                            <label for="editEventTime" class="form-label" style="color: var(--text-muted);">Start Time</label>
                            <input type="text" class="form-control" id="editEventTime" placeholder="Select Time" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-6 col-md-4 mb-3">
                            <label for="editEventEndTime" class="form-label" style="color: var(--text-muted);">End Time</label>
                            <input type="text" class="form-control" id="editEventEndTime" placeholder="Select Time" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="editEventVenue" class="form-label" style="color: var(--text-muted);">Venue</label>
                            <input type="text" class="form-control" id="editEventVenue" placeholder="Enter venue name" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="editEventStatus" class="form-label" style="color: var(--text-muted);">Status</label>
                            <select class="form-select" id="editEventStatus" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                                <option value="completed">Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editEventDescription" class="form-label" style="color: var(--text-muted);">Description</label>
                        <textarea class="form-control" id="editEventDescription" rows="3" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);"></textarea>
                    </div>

                    <hr style="border-color: var(--border-color);">
                    <div class="mb-3">
                        <label for="editEventAttendees" class="form-label" style="color: var(--text-muted);">Total Capacity</label>
                        <input type="number" class="form-control" id="editEventAttendees" placeholder="0" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    </div>
                    <hr style="border-color: var(--border-color);">
                    
                    <!-- Seat Config -->
                    <h6 class="mb-3" style="color: var(--text-muted);">Seat Configuration</h6>
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="editSeatingByTableSwitch">
                        <label class="form-check-label" for="editSeatingByTableSwitch" style="color: var(--text-main);">Seating by Table</label>
                    </div>

                    <div id="editTotalSeatsContainer">
                        <label for="editEventTotalSeats" class="form-label" style="color: var(--text-muted);">Total Number of Seats</label>
                        <input type="number" class="form-control mb-3" id="editEventTotalSeats" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                    </div>

                    <div id="editTableSeatingContainer" style="display: none;">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editEventTotalTables" class="form-label" style="color: var(--text-muted);">Number of Tables</label>
                                <input type="number" class="form-control" id="editEventTotalTables" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editEventSeatsPerTable" class="form-label" style="color: var(--text-muted);">Seats per Table</label>
                                <input type="number" class="form-control" id="editEventSeatsPerTable" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                            </div>
                            <div id="editTableCapacityWarning" class="text-danger small fw-bold mb-3" style="display: none;"><i class="bi bi-exclamation-triangle-fill me-1"></i> Calculated seats exceed total capacity!</div>
                        </div>
                    </div>
                    <small id="editSeatCountIndicator" class="form-text text-muted d-block mt-2">Current number of seats: 0 / 0</small>


                    <div class="mb-3">
                        <label for="editSeatLayout" class="form-label" style="color: var(--text-muted);">Layout Preference</label>
                        <select class="form-select" id="editSeatLayout" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                            <option value="empty">Empty Canvas</option>
                            <option value="theater">Theater Style</option>
                            <option value="banquet">Banquet Hall</option>
                        </select>
                    </div>

                    <hr style="border-color: var(--border-color);">

                    <!-- Ticket Config -->
                    <h6 class="mb-3" style="color: var(--text-muted);">Ticket Configuration</h6>
                    <div class="mb-3">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="editEventType" id="editTypeFree" value="free">
                            <label class="form-check-label" for="editTypeFree" style="color: var(--text-main);">Free Event</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="editEventType" id="editTypePaid" value="paid">
                            <label class="form-check-label" for="editTypePaid" style="color: var(--text-main);">Paid Event</label>
                        </div>
                    </div>
                    <div id="editTicketTiersWrapper" style="display: none;">
                        <h6 class="form-label" style="color: var(--text-muted);">Ticket Tiers</h6>
                        <div id="editTiersList"></div>
                        <button type="button" class="btn btn-sm btn-outline-secondary mt-2" id="btnEditAddTier" style="border-color: var(--border-color); color: var(--text-muted);">
                            <i class="bi bi-plus"></i> Add Tier
                        </button>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-outline-info me-auto" id="btnSendTestTicketFromEdit">Send Test Ticket</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="btnSaveEdit" style="background-color: var(--primary); border-color: var(--primary);">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        let flatpickrInstances = [];
    
        // Expose the main population function globally
        window.populateEditEventModal = function(eventId) {
            const event = MockDB.getEvents().find(e => e.event_id == eventId);
            if (!event) return;
    
            // Destroy old flatpickr instances to prevent memory leaks
            flatpickrInstances.forEach(fp => fp.destroy());
            flatpickrInstances = [];
    
            // --- Populate Fields ---
            document.getElementById('editEventId').value = event.event_id;
            document.getElementById('editEventName').value = event.title;
            document.getElementById('editEventVenue').value = event.venue_name || (event.venue_id ? MockDB.getVenueById(event.venue_id)?.name : '') || '';
            document.getElementById('editEventDescription').value = event.description || '';
            document.getElementById('editEventAttendees').value = event.attendees || '';
            document.getElementById('editEventStatus').value = event.status;
    
            // --- Date & Time ---
            const start = event.start_datetime ? new Date(event.start_datetime) : null;
            const end = event.end_datetime ? new Date(event.end_datetime) : null;
    
            flatpickrInstances.push(flatpickr("#editEventDate", {
                defaultDate: start,
                dateFormat: "Y-m-d",
                allowInput: true
            }));
            flatpickrInstances.push(flatpickr("#editEventTime", {
                defaultDate: start, enableTime: true, noCalendar: true,
                dateFormat: "H:i", // For backend
                altInput: true, // For user display
                altFormat: "h:i K", // 12-hour format with AM/PM
                time_24hr: false, // UI picker
                allowInput: true
            }));
            flatpickrInstances.push(flatpickr("#editEventEndTime", {
                defaultDate: end, enableTime: true, noCalendar: true,
                dateFormat: "H:i", // For backend
                altInput: true, // For user display
                altFormat: "h:i K", // 12-hour format with AM/PM
                time_24hr: false, // UI picker
                allowInput: true
            }));
    
            // --- Seating Config ---
            document.getElementById('editSeatingByTableSwitch').checked = event.seating_by_table || false;
            document.getElementById('editEventTotalSeats').value = event.total_seats || '';
            document.getElementById('editEventTotalTables').value = event.total_tables || '';
            document.getElementById('editEventSeatsPerTable').value = event.seats_per_table || '';
            document.getElementById('editSeatLayout').value = event.layout_preference || 'empty';
            
            toggleEditSeatConfig(); // Update visibility based on checkbox
            updateEditSeatIndicator(); // Update counter
    
            // --- Ticket Config ---
            const radioPaid = document.getElementById('editTypePaid');
            const radioFree = document.getElementById('editTypeFree');
            const tiersWrapper = document.getElementById('editTicketTiersWrapper');
            const tiersList = document.getElementById('editTiersList');
    
            if (event.is_paid) {
                radioPaid.checked = true;
                tiersWrapper.style.display = 'block';
            } else {
                radioFree.checked = true;
                tiersWrapper.style.display = 'none';
            }
    
            // Populate Tiers
            tiersList.innerHTML = '';
            if (event.tickets && event.tickets.length > 0) {
                event.tickets.forEach(ticket => addEditTierRow(ticket));
            } else if (event.is_paid) {
                addEditTierRow(); // Add one empty row if no tickets exist for a paid event
            }
    
            // --- Show Modal ---
            const modalEl = document.getElementById('editEventModal');
            const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
            modal.show();
        };
    
        function addEditTierRow(ticket = {}) {
            const list = document.getElementById('editTiersList');
            const row = document.createElement('div');
            row.className = 'row g-2 mb-2 tier-row';
            
            const nameVal = ticket.name || '';
            const priceVal = ticket.price || '';
            const qtyVal = ticket.qty || '';
    
            row.innerHTML = `
                <div class="col-5">
                    <input type="text" class="form-control form-control-sm tier-name" placeholder="Tier Name" value="${nameVal}" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                </div>
                <div class="col-3">
                    <input type="number" class="form-control form-control-sm tier-price" placeholder="Price" value="${priceVal}" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                </div>
                <div class="col-4">
                    <div class="input-group input-group-sm">
                        <input type="number" class="form-control tier-qty" placeholder="Qty" value="${qtyVal}" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        <button type="button" class="btn btn-outline-danger btn-remove-tier"><i class="bi bi-x"></i></button>
                    </div>
                </div>
            `;
    
            row.querySelector('.btn-remove-tier').addEventListener('click', () => row.remove());
            list.appendChild(row);
        }
    
        function saveEventChanges() {
            const id = document.getElementById('editEventId').value;
            const date = document.getElementById('editEventDate').value;
            const time = document.getElementById('editEventTime').value;
            const endTime = document.getElementById('editEventEndTime').value;
            
            let tickets = [];
            if (document.getElementById('editTypePaid').checked) {
                document.querySelectorAll('#editTiersList .tier-row').forEach(row => {
                    const tName = row.querySelector('.tier-name').value;
                    const tPrice = row.querySelector('.tier-price').value;
                    const tQty = row.querySelector('.tier-qty').value;
                    if (tName) tickets.push({ name: tName, price: tPrice, qty: tQty });
                });
            }
    
            const seatingByTable = document.getElementById('editSeatingByTableSwitch').checked;
            const totalTables = document.getElementById('editEventTotalTables').value;
            const seatsPerTable = document.getElementById('editEventSeatsPerTable').value;
            let totalSeats;
            if (seatingByTable) {
                totalSeats = (parseInt(totalTables) || 0) * (parseInt(seatsPerTable) || 0);
            } else {
                totalSeats = document.getElementById('editEventTotalSeats').value;
            }
    
            const updateData = {
                title: document.getElementById('editEventName').value,
                start_datetime: `${date}T${time}`,
                end_datetime: endTime ? `${date}T${endTime}` : null,
                venue_name: document.getElementById('editEventVenue').value,
                description: document.getElementById('editEventDescription').value,
                attendees: document.getElementById('editEventAttendees').value,
                total_seats: totalSeats,
                total_tables: seatingByTable ? totalTables : 0,
                seating_by_table: seatingByTable,
                seats_per_table: seatingByTable ? seatsPerTable : 0,
                layout_preference: document.getElementById('editSeatLayout').value,
                is_paid: document.getElementById('editTypePaid').checked,
                tickets: tickets,
                status: document.getElementById('editEventStatus').value
            };
    
            MockDB.updateEvent(id, updateData);
            
            const modalEl = document.getElementById('editEventModal');
            const modal = bootstrap.Modal.getInstance(modalEl);
            if (modal) modal.hide();
        }
    
        function toggleEditSeatConfig() {
            const seatingSwitch = document.getElementById('editSeatingByTableSwitch');
            const totalSeatsContainer = document.getElementById('editTotalSeatsContainer');
            const tableSeatingContainer = document.getElementById('editTableSeatingContainer');
            if (!seatingSwitch || !totalSeatsContainer || !tableSeatingContainer) return;

            if (seatingSwitch.checked) {
                totalSeatsContainer.style.display = 'none';
                tableSeatingContainer.style.display = 'block';
            } else {
                totalSeatsContainer.style.display = 'block';
                tableSeatingContainer.style.display = 'none';
            }
            updateEditSeatIndicator();
        }
    
        function updateEditSeatIndicator() {
            const indicator = document.getElementById('editSeatCountIndicator');
            if (!indicator) return;
            const capacity  = parseInt(document.getElementById('editEventAttendees')?.value) || 0;
            const byTable   = document.getElementById('editSeatingByTableSwitch')?.checked;
    
            let calculated = 0;
            if (byTable) {
                const tables   = parseInt(document.getElementById('editEventTotalTables')?.value)   || 0;
                const perTable = parseInt(document.getElementById('editEventSeatsPerTable')?.value) || 0;
                calculated = tables * perTable;
                const warning = document.getElementById('editTableCapacityWarning');
                if (warning) {
                    warning.style.display = (capacity > 0 && calculated > capacity) ? 'block' : 'none';
                    warning.textContent = `Calculated seats (${calculated}) exceed total capacity (${capacity})!`;
                }
            } else {
                calculated = parseInt(document.getElementById('editEventTotalSeats')?.value) || 0;
            }
    
            indicator.textContent = `Current number of seats: ${calculated} / ${capacity}`;
        }
    
        // --- Bind Controls (Run once when script is loaded) ---
        document.getElementById('btnSaveEdit')?.addEventListener('click', saveEventChanges);
        document.getElementById('btnEditAddTier')?.addEventListener('click', () => addEditTierRow());
    
        const radioPaid = document.getElementById('editTypePaid');
        const radioFree = document.getElementById('editTypeFree');
        const tiersWrapper = document.getElementById('editTicketTiersWrapper');
        if (radioPaid && radioFree && tiersWrapper) {
            radioPaid.addEventListener('change', () => tiersWrapper.style.display = 'block');
            radioFree.addEventListener('change', () => tiersWrapper.style.display = 'none');
        }
    
        // Seating config listeners
        document.getElementById('editSeatingByTableSwitch')?.addEventListener('change', toggleEditSeatConfig);
        ['editEventTotalSeats', 'editEventTotalTables', 'editEventSeatsPerTable', 'editEventAttendees'].forEach(id => {
            document.getElementById(id)?.addEventListener('input', updateEditSeatIndicator);
        });
    
    })();
</script>
