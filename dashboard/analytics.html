<style>
    /* Basic styling for the analytics page */
    .analytic-container {
        padding: 1rem; /* Base padding */
    }

    .analytic-header-container {
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--border-color);
    }

    .analytic-header {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--text-main);
    }

    .analytic-description {
        font-size: 1rem;
        color: var(--text-muted);
        margin-bottom: 2.5rem;
        max-width: 800px;
    }

    .chart-card {
        background-color: var(--bg-panel);
        padding: 1.5rem;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        height: 100%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .analytic-container {
            padding: 0.75rem;
        }
        h1.analytic-header {
            font-size: 1.75rem;
        }
        p.analytic-description {
            font-size: 0.9rem;
        }
        .chart-card {
            padding: 1rem;
        }
    }
</style>
<div class="container-fluid py-4">
    <div class="analytic-header-container">
        <h1 class="analytic-header">Event Analytics</h1>
    </div>

    <div class="analytic-content-container">
        <p class="analytic-description">Track your event's performance with our comprehensive analytics dashboard. Monitor ticket sales, attendance, and engagement metrics in real-time to make informed decisions and optimize your event strategy.</p>

        <div class="row g-4">
            <!-- Ticket Sales Chart -->
            <div class="col-12 col-lg-8">
                <div class="chart-card">
                    <h5 class="mb-3" style="color: var(--text-main);">Ticket Sales Over Time</h5>
                    <canvas id="ticketSalesChart"></canvas>
                </div>
            </div>

            <!-- Attendee Demographics Chart -->
            <div class="col-12 col-lg-4">
                <div class="chart-card">
                    <h5 class="mb-3" style="color: var(--text-main);">Attendee Age Group</h5>
                    <canvas id="attendeeDemographicsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Guest List Section -->
        <div class="row g-4 mt-2">
            <div class="col-12">
                <div class="chart-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0" style="color: var(--text-main);">Guest List</h5>
                        <div class="input-group" style="max-width: 250px;">
                            <span class="input-group-text" style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-muted);"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" placeholder="Search guests..." style="background-color: var(--bg-panel); border-color: var(--border-color); color: var(--text-main);">
                        </div>
                    </div>
                    <div id="analyticsGuestList" class="list-group list-group-flush overflow-auto" style="max-height: 400px;">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Ensure this script runs only once the analytics page is loaded
    (function() {
        // Chart 1: Ticket Sales (Bar Chart)
        const salesCtx = document.getElementById('ticketSalesChart');
        if (salesCtx) {
            new Chart(salesCtx, {
                type: 'bar',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6'],
                    datasets: [{
                        label: 'Tickets Sold',
                        data: [65, 59, 80, 81, 56, 55],
                        backgroundColor: 'rgba(220, 53, 69, 0.6)', // Primary color with opacity
                        borderColor: 'rgba(220, 53, 69, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        // Chart 2: Attendee Demographics (Doughnut Chart)
        const demoCtx = document.getElementById('attendeeDemographicsChart');
        if (demoCtx) {
            new Chart(demoCtx, {
                type: 'doughnut',
                data: {
                    labels: ['18-24', '25-34', '35-44', '45+'],
                    datasets: [{
                        label: 'Attendee Age Group',
                        data: [300, 50, 100, 80],
                        backgroundColor: [
                            'rgba(220, 53, 69, 0.8)',
                            'rgba(255, 193, 7, 0.8)',
                            'rgba(13, 110, 253, 0.8)',
                            'rgba(25, 135, 84, 0.8)'
                        ],
                        hoverOffset: 4
                    }]
                }
            });
        }

        // Render Guest List (Placeholder)
        const guestListContainer = document.getElementById('analyticsGuestList');
        if (guestListContainer) {
            // Placeholder for guest list rendering
            guestListContainer.innerHTML = '<div class="text-center text-muted small mt-3">No guests loaded.</div>';
        }
    })();
</script>
