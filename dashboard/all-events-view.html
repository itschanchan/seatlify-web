<!-- All Events View -->
<div class="card shadow-sm border-0 mt-4" style="background-color: var(--bg-panel);">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0" style="color: var(--text-main);">All Events</h4>

            <!-- View Toggle Pills -->
            <ul class="nav nav-pills flex-nowrap">
                <li class="nav-item">
                    <button class="nav-link active" id="btnViewTable" title="Table View"
                            style="background-color: var(--primary);">
                        <i class="bi bi-table"></i>
                        <span class="d-none d-sm-inline">Table</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btnViewCalendar" title="Calendar View"
                            style="color: var(--text-muted);">
                        <i class="bi bi-calendar3"></i>
                        <span class="d-none d-sm-inline">Calendar</span>
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="btnViewSimplified" title="Simplified View"
                            style="color: var(--text-muted);">
                        <i class="bi bi-card-list"></i>
                        <span class="d-none d-sm-inline">List</span>
                    </button>
                </li>
            </ul>
        </div>

        <!-- Dynamically rendered event table / calendar / list -->
        <div id="event-view-container"></div>
    </div>
</div>
