<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Invited!</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS for Ticket Design -->
    <link rel="stylesheet" href="../assets/customization/theme.css">
    <link rel="stylesheet" href="../assets/ticket-styles.css">

    <!-- Mock DB -->
    <script src="../js/simulated-db.js"></script>

    <style>
        body {
            background-color: #f4f6f8;
            padding: 2rem 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
        }
        .invitation-wrapper {
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin: auto;
            overflow: hidden;
        }
        .banner-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .seat-btn {
            width: 40px;
            height: 40px;
        }
        .seat-available {
            background-color: #fff;
            border-color: #6c757d;
        }
        .seat-reserved {
            background-color: #dc3545;
            color: white;
            border-color: #dc3545;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .seat-unavailable {
            background-color: #e9ecef;
            border-color: #dee2e6;
            cursor: not-allowed;
        }
        @media (max-width: 767.98px) {
            .banner-img {
                height: 200px !important;
            }
            .display-4 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="invitation-wrapper">
        <div id="publicInvitationSections">
            <!-- SECTION: Banner -->
            <div class="invitation-section" data-section="banner">
                <div class="position-relative bg-light">
                    <img src="https://via.placeholder.com/800x300/dee2e6/6c757d.png?text=Event+Banner" class="banner-img" alt="Event Banner">
                </div>
            </div>

            <!-- SECTION: Header -->
            <div class="invitation-section p-4 p-md-5" data-section="header">
                <h1 class="display-4 mb-3 text-dark" id="invitationTitle">You're Invited!</h1>
                <p class="lead text-muted" id="invitationHostLine">Hosted by: <span class="fw-bold text-dark">Your Organization</span></p>
                <hr class="my-4">
                <div class="mb-4 fs-5 text-dark" id="invitationDescription"></div>
            </div>

            <!-- SECTION: Details -->
            <div class="invitation-section p-4 p-md-5" data-section="details">
                <div class="card mb-4 border-0 bg-light">
                    <div class="card-body">
                        <h5 class="card-title text-dark">When & Where</h5>
                        <p class="card-text mb-0 text-dark" id="invitationTime"><i class="bi bi-calendar3 me-2"></i>-</p>
                        <p class="card-text text-dark" id="invitationVenue"><i class="bi bi-geo-alt-fill me-2"></i>-</p>
                    </div>
                </div>
            </div>

            <!-- SECTION: RSVP Question -->
            <div class="invitation-section p-4 p-md-5" data-section="rsvp_question">
                <div class="p-4 rounded bg-light text-center">
                    <h4 class="mb-3 text-dark">Will you be attending?</h4>
                    <div class="d-grid gap-2 d-sm-flex justify-content-sm-center" id="rsvpButtons">
                        <button class="btn btn-success btn-lg px-4" onclick="showRsvpForm()">Yes, I'll be there!</button>
                        <button class="btn btn-outline-secondary btn-lg px-4" onclick="declineRsvp()">No, I can't make it</button>
                    </div>
                </div>
            </div>

            <!-- SECTION: RSVP Form -->
            <div class="invitation-section p-4 p-md-5" data-section="rsvp_form" style="display: none;">
                <div class="p-4 rounded bg-light text-center">
                    <div id="rsvpForm" class="text-start mt-4 mx-auto col-md-8">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="guestName">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="guestEmail">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" class="form-control" id="guestAge" placeholder="Enter your age">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Seat Reservation</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="selectedSeatDisplay" placeholder="No seat selected" readonly style="background-color: #fff;">
                                <button class="btn btn-outline-primary" type="button" onclick="openSeatModal()">
                                    <i class="bi bi-grid-3x3"></i> Reserve Seat
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button class="btn btn-primary btn-lg">Confirm RSVP</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Ticket Success Modal -->
<div class="modal fade" id="ticketSuccessModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-bottom-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pt-0 pb-4">
                <!-- Ticket content injected here -->
            </div>
        </div>
    </div>
</div>

<!-- Seat Reservation Modal -->
<div class="modal fade" id="seatReservationModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Select Your Seat</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body bg-light">
                <div id="seatMapContainer" class="d-flex flex-column gap-3 align-items-center p-3">
                    <!-- Seats will be rendered here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentEvent = null;

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('event');

        if (eventId) {
            const events = MockDB.getEvents();
            currentEvent = events.find(e => e.event_id == eventId);
            
            if (currentEvent) {
                // Check for custom sections configuration
                if (currentEvent.invitation_config && currentEvent.invitation_config.sections) {
                    const container = document.getElementById('publicInvitationSections');
                    if (container) {
                        container.innerHTML = ''; // Force clear default layout
                    }

                    currentEvent.invitation_config.sections.forEach(sectionData => {
                        container.appendChild(renderSection(sectionData, currentEvent));
                    });
                } else {
                    // Fallback to default layout if no config exists
                    // (The default HTML is already in the DOM, just populate it)
                    document.getElementById('invitationTitle').textContent = currentEvent.title;
                    const start = new Date(currentEvent.start_datetime);
                    document.getElementById('invitationTime').innerHTML = `<i class="bi bi-calendar3 me-2"></i> ${start.toLocaleString()}`;
                    const venue = MockDB.getVenueById(currentEvent.venue_id);
                    document.getElementById('invitationVenue').innerHTML = `<i class="bi bi-geo-alt-fill me-2"></i> ${venue ? venue.name : 'Unknown Venue'}`;
                    document.getElementById('invitationDescription').textContent = currentEvent.description || 'No description provided.';
                }
            }
        }
    });

    function renderSection(data, event) {
        const div = document.createElement('div');
        div.className = 'invitation-section p-4 p-md-5';
        div.dataset.section = data.type;

        switch(data.type) {
            case 'banner':
                div.className = 'invitation-section'; // No padding
                div.innerHTML = `<div class="position-relative bg-light"><img src="${data.image}" class="banner-img" alt="Event Banner"></div>`;
                break;
            case 'image':
                div.className = 'invitation-section'; // No padding
                div.innerHTML = `<div class="position-relative bg-light"><img src="${data.image}" class="img-fluid w-100" style="object-fit: cover; max-height: 300px;"></div>`;
                break;
            case 'header':
                div.innerHTML = `
                    <h1 class="display-4 mb-3 text-dark">${event.title}</h1>
                    <p class="lead text-muted">${data.host}</p>
                    <hr class="my-4">
                    <div class="mb-4 fs-5 text-dark">${data.description}</div>
                `;
                break;
            case 'section':
                div.innerHTML = `
                    <h3 class="text-dark">${data.title}</h3>
                    <div class="text-dark">${data.content}</div>
                `;
                break;
            case 'details':
                const start = new Date(event.start_datetime);
                const venue = MockDB.getVenueById(event.venue_id);
                div.innerHTML = `
                    <div class="card mb-4 border-0 bg-light">
                        <div class="card-body">
                            <h5 class="card-title text-dark">When & Where</h5>
                            <p class="card-text mb-0 text-dark"><i class="bi bi-calendar3 me-2"></i>${start.toLocaleString()}</p>
                            <p class="card-text text-dark"><i class="bi bi-geo-alt-fill me-2"></i>${venue ? venue.name : 'Unknown Venue'}</p>
                        </div>
                    </div>
                `;
                break;
            case 'form':
                div.innerHTML = `
                    <div class="mb-3">
                        <label class="form-label text-muted">${data.label}</label>
                        <input type="text" class="form-control" placeholder="Input field">
                    </div>
                `;
                break;
            case 'question':
                div.innerHTML = `
                    <div class="text-center">
                        <h4 class="mb-3 text-dark">${data.question}</h4>
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <button class="btn btn-success">Yes</button>
                            <button class="btn btn-secondary">No</button>
                        </div>
                    </div>
                `;
                break;
            case 'rsvp_question':
                div.innerHTML = `
                    <div class="p-4 rounded bg-light text-center">
                        <h4 class="mb-3 text-dark">Will you be attending?</h4>
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center" id="rsvpButtons">
                            <button class="btn btn-success btn-lg px-4" onclick="showRsvpForm()">Yes, I'll be there!</button>
                            <button class="btn btn-outline-secondary btn-lg px-4" onclick="declineRsvp()">No, I can't make it</button>
                        </div>
                    </div>
                `;
                break;
            case 'rsvp_form':
                div.style.display = 'none'; // Hidden initially
                div.innerHTML = `
                    <div class="p-4 rounded bg-light text-center">
                        <div id="rsvpForm" class="text-start mt-4 mx-auto col-md-8">
                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="guestName">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="guestEmail">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" id="guestAge" placeholder="Enter your age">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Seat Reservation</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="selectedSeatDisplay" placeholder="No seat selected" readonly style="background-color: #fff;">
                                    <button class="btn btn-outline-primary" type="button" onclick="openSeatModal('${data.viewPreference || 'chart'}')">
                                        <i class="bi bi-grid-3x3"></i> Reserve Seat
                                    </button>
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button class="btn btn-primary btn-lg" onclick="confirmRsvp()">Confirm RSVP</button>
                            </div>
                        </div>
                    </div>
                `;
                break;
        }
        return div;
    }

    function showRsvpForm() {
        const questionSection = document.querySelector('[data-section="rsvp_question"]');
        const formSection = document.querySelector('[data-section="rsvp_form"]');

        if (questionSection && formSection) {
            // 1. Start fade out of question block
            questionSection.style.transition = 'opacity 0.3s ease-out';
            questionSection.style.opacity = '0';

            // 2. After fade out is complete...
            questionSection.addEventListener('transitionend', () => {
                questionSection.style.display = 'none';
                
                // 3. Prepare form for fade-in
                formSection.style.opacity = '0';
                formSection.style.display = 'block';
                formSection.style.transition = 'opacity 0.4s ease-in';
                
                // 4. Trigger fade-in
                setTimeout(() => { formSection.style.opacity = '1'; }, 10);

            }, { once: true });
        }
    }

    function declineRsvp() {
        const questionSection = document.querySelector('[data-section="rsvp_question"]');
        if (questionSection) {
            questionSection.style.transition = 'opacity 0.3s ease-out';
            questionSection.style.opacity = '0';
            questionSection.addEventListener('transitionend', () => {
                questionSection.innerHTML = '<div class="p-4 rounded bg-light text-center text-muted">Thank you for your response.</div>';
                questionSection.style.opacity = '1';

            }, { once: true });
        }
    }

    function openSeatModal(viewPreference) {
        const modal = new bootstrap.Modal(document.getElementById('seatReservationModal'));
        renderSeats(viewPreference || 'chart');
        modal.show();
    }

    function renderSeats(viewPreference) {
        const container = document.getElementById('seatMapContainer');
        container.innerHTML = '';

        if (!currentEvent) {
            container.innerHTML = '<div class="text-muted p-3">Event data not found.</div>';
            return;
        }

        // Add Legend
        const legend = document.createElement('div');
        legend.className = 'd-flex gap-3 mb-3 justify-content-center w-100';
        legend.innerHTML = `
            <div class="d-flex align-items-center gap-1"><div class="border rounded" style="width:15px; height:15px; background:#fff; border-color:#6c757d;"></div> <small>Available</small></div>
            <div class="d-flex align-items-center gap-1"><div class="border rounded" style="width:15px; height:15px; background:#dc3545; opacity:0.6;"></div> <small>Reserved</small></div>
            <div class="d-flex align-items-center gap-1"><div class="border rounded" style="width:15px; height:15px; background:#e9ecef;"></div> <small>Unavailable</small></div>
        `;
        container.appendChild(legend);

        if (viewPreference === 'map') {
            container.className = 'p-3';
            const mapDiv = document.createElement('div');
            mapDiv.style.cssText = 'position: relative; min-height: 500px; border: 1px solid #ddd; background-color: #f9f9f9;';
            
            if (currentEvent.blueprint_layout && currentEvent.blueprint_layout.length > 0) {
                currentEvent.blueprint_layout.forEach(shape => {
                    const el = document.createElement('div');
                    el.style.cssText = `position: absolute; left: ${shape.left}; top: ${shape.top}; width: ${shape.width}; height: ${shape.height};`;
                    el.className = `border rounded`;
                    
                    if (shape.type === 'chair') {
                        el.className += ' d-flex align-items-center justify-content-center btn btn-outline-secondary seat-btn';
                        // All seats available
                        el.className += ' seat-available';
                        
                        el.textContent = 'S'; // Placeholder for seat number
                        el.onclick = () => selectSeat('Map Seat', 'N/A', 0);
                    } else if (shape.type === 'rect') {
                        el.style.backgroundColor = '#e9ecef';
                    } else if (shape.type === 'circle') {
                        el.style.backgroundColor = '#e9ecef';
                        el.style.borderRadius = '50%';
                    } else if (shape.type === 'text' || shape.type === 'comment') {
                        el.className = ''; // No border for text
                        el.textContent = shape.text;
                    }
                    mapDiv.appendChild(el);
                });
            } else {
                mapDiv.innerHTML = '<div class="text-muted text-center p-5">No map layout configured for this event.</div>';
            }
            container.appendChild(mapDiv);
        } else { // Chart or Table view
            container.className = viewPreference === 'table' 
                ? 'd-flex flex-row flex-wrap gap-3 justify-content-center p-3' 
                : 'd-flex flex-column gap-3 align-items-center p-3';

            // Load data based on preference
            let layoutData = [];
            if (viewPreference === 'table') {
                if (currentEvent.table_layout_data) layoutData = currentEvent.table_layout_data;
            } else {
                // Default to chart/row
                if (currentEvent.row_layout_data) layoutData = currentEvent.row_layout_data;
            }

            if (!layoutData || layoutData.length === 0) {
                container.innerHTML = '<div class="text-muted text-center p-3">No seat layout found for this view type.</div>';
                return;
            }

            layoutData.forEach(group => {
                // Find price if available
                let priceInfo = '';
                let ticketPrice = 0;
                let displayLabel = group.label; // Default to internal label

                if (currentEvent.tickets) {
                    const ticket = currentEvent.tickets.find(t => t.name === group.label || t.original_name === group.label);
                    if (ticket) {
                        if (ticket.price) {
                            ticketPrice = ticket.price;
                            priceInfo = `<small class="text-muted d-block">₱${ticket.price}</small>`;
                        }
                        // Use the custom name if available
                        if (ticket.name) {
                            displayLabel = ticket.name;
                        }
                    }
                }

                const groupDiv = document.createElement('div');
                groupDiv.className = 'card w-100 shadow-sm border-0';
                groupDiv.innerHTML = `
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                            <h6 class="card-title mb-0">${displayLabel}</h6>
                            ${priceInfo}
                        </div>
                        <div class="d-flex flex-wrap gap-2 justify-content-center">
                            ${Array.from({length: group.seats}, (_, i) => {
                                // All seats available
                                const statusClass = 'seat-available';
                                const clickHandler = `onclick="selectSeat('${displayLabel}', ${i+1}, ${ticketPrice}, '${group.label}')"`;
                                return `<button class="btn btn-outline-secondary seat-btn ${statusClass}" ${clickHandler} title="Seat ${i+1}">${i+1}</button>`;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(groupDiv);
            });
        }
    }

    function selectSeat(displayLabel, number, price, originalLabel) {
        let display = `${displayLabel} - Seat ${number}`;
        if (price && price > 0) {
            display += ` (₱${price})`;
        }
        const seatInput = document.getElementById('selectedSeatDisplay');
        seatInput.value = display;
        // Store structured data
        seatInput.dataset.row = originalLabel || displayLabel; // The internal row name
        seatInput.dataset.column = number;
        seatInput.dataset.price = price;

        const modalEl = document.getElementById('seatReservationModal');
        const modal = bootstrap.Modal.getInstance(modalEl);
        modal.hide();
    }

    function confirmRsvp() {
        const nameInput = document.getElementById('guestName');
        const emailInput = document.getElementById('guestEmail');
        const seatInput = document.getElementById('selectedSeatDisplay');
        
        if (!nameInput || !emailInput || !seatInput) return;
        
        const name = nameInput.value;
        const email = emailInput.value;
        const seatDisplay = seatInput.value;

        if (!name || !email || !seatDisplay) {
            alert("Please fill in all fields and select a seat.");
            return;
        }

        // Simulate Sending
        const btn = document.querySelector('#rsvpForm button.btn-primary');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';
        btn.disabled = true;

        // Get structured seat data
        const seatRow = seatInput.dataset.row;
        const seatColumn = seatInput.dataset.column;
        const seatPrice = seatInput.dataset.price || 0;

        // Generate Ticket HTML for display AND email
        const ticketHtml = generateTicketHtml(currentEvent, name, seatDisplay);

        // Prepare data for backend
        const payload = {
            event_id: currentEvent.event_id,
            guest_name: name,
            guest_email: email,
            guest_age: document.getElementById('guestAge').value,
            seat_row: seatRow,
            seat_column: seatColumn,
            price: seatPrice,
            ticket_html: ticketHtml // Pass generated HTML to backend
        };

        // Call PHP Backend
        fetch('../backend/rsvp_process.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            btn.innerHTML = originalText;
            btn.disabled = false;

            if (data.success) {
                // Show Success Modal
                const modalEl = document.getElementById('ticketSuccessModal');
                const modalBody = modalEl.querySelector('.modal-body');
                modalBody.innerHTML = `
                    <div class="text-center mb-4">
                        <i class="bi bi-check-circle-fill text-success display-1"></i>
                        <h4 class="mt-3">RSVP Confirmed!</h4>
                        <p class="text-muted">A copy of this ticket has been sent to <strong>${email}</strong></p>
                    </div>
                    ${ticketHtml}
                `;
                const modal = new bootstrap.Modal(modalEl);
                modal.show();
            } else {
                alert('Reservation Failed: ' + data.message);
            }
        })
        .catch((error) => {
            console.error('Error:', error);
            alert('An error occurred while processing your reservation.');
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    }

    function generateTicketHtml(event, guestName, seatInfo) {
        const qrData = `EVENT:${event.event_id}|GUEST:${guestName}|SEAT:${seatInfo}`;
        const qrUrl = MockDB.generateQRCodeUrl(qrData);
        
        const start = new Date(event.start_datetime);
        const dateStr = start.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        const timeStr = start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const venue = MockDB.getVenueById(event.venue_id);
        const venueName = venue ? venue.name : 'Unknown Venue';

        return `
            <div class="ticket-container mx-auto" style="max-width: 100%; padding: 1.5rem; box-shadow: none; border: 1px solid var(--border-color);">
                <div class="ticket-header-container mb-3">
                    <h2 class="ticket-header fs-2">Event Ticket</h2>
                </div>
                <div class="qr-code-container mb-3">
                    <img src="${qrUrl}" alt="QR Code" class="img-fluid rounded" style="max-width: 150px;">
                </div>
                <div class="ticket-divider mb-3"></div>
                <div class="ticket-info-container">
                    <div class="ticket-info-row"><span class="ticket-info-label">Event</span><span class="ticket-info-value">${event.title}</span></div>
                    <div class="ticket-info-row"><span class="ticket-info-label">Guest</span><span class="ticket-info-value">${guestName}</span></div>
                    <div class="ticket-info-row"><span class="ticket-info-label">Date</span><span class="ticket-info-value">${dateStr}</span></div>
                    <div class="ticket-info-row"><span class="ticket-info-label">Time</span><span class="ticket-info-value">${timeStr}</span></div>
                    <div class="ticket-info-row"><span class="ticket-info-label">Venue</span><span class="ticket-info-value">${venueName}</span></div>
                    <div class="ticket-info-row" style="border-bottom: none;">
                        <span class="ticket-info-label">Seat</span><span class="ticket-info-value fw-bold text-primary">${seatInfo}</span>
                    </div>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
